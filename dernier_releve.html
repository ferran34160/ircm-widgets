<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dernier relevé PGM</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 22px 24px; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #e8e8e8; } }

.wrap { max-width: 1200px; margin: 0 auto; }
.topbar { margin-bottom: 14px; }
#contrat-filter { font-size: 13px; padding: 7px 12px; border: 1px solid #ccc; border-radius: 9px; background: inherit; color: inherit; cursor: pointer; min-width: 280px; }
#contrat-filter:focus { outline: none; border-color: #378ADD; }
@media (prefers-color-scheme: dark) { #contrat-filter { border-color: #444; } }
.date-section { margin-top: 26px; }
.date-head { display: flex; align-items: baseline; gap: 12px; padding-bottom: 8px; border-bottom: 2px solid #e5e5e5; margin-bottom: 13px; flex-wrap: wrap; }
@media (prefers-color-scheme: dark) { .date-head { border-bottom-color: #333; } }
.date-titre { font-size: 15px; font-weight: 600; }
.date-badge { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: #E6F1FB; color: #0C447C; }
@media (prefers-color-scheme: dark) { .date-badge { background: #16314A; color: #9FC6EE; } }
.date-total { margin-left: auto; font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }

/* ---------- Hero ---------- */
.hero { border-radius: 18px; padding: 26px 30px; background: linear-gradient(135deg, #2F6FB5 0%, #4A8FD4 55%, #6BA9E8 100%); color: #fff; position: relative; overflow: hidden; box-shadow: 0 6px 24px rgba(47,111,181,0.22); }
.hero::after { content: '📸'; position: absolute; right: 26px; top: 50%; transform: translateY(-50%); font-size: 78px; opacity: 0.14; }
.hero-label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; opacity: 0.82; font-weight: 600; }
.hero-date { font-size: 34px; font-weight: 600; margin-top: 6px; letter-spacing: -0.02em; }
.hero-ago { font-size: 12.5px; opacity: 0.78; margin-top: 4px; }

.hero-stats { display: flex; flex-wrap: wrap; gap: 34px; margin-top: 22px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.22); }
.hstat-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; opacity: 0.78; }
.hstat-val { font-size: 22px; font-weight: 600; margin-top: 3px; font-variant-numeric: tabular-nums; display: flex; align-items: baseline; gap: 8px; }
.hstat-delta { font-size: 12.5px; font-weight: 500; padding: 2px 9px; border-radius: 20px; background: rgba(255,255,255,0.2); }

/* ---------- Sections ---------- */
.cat-section { margin-top: 26px; }
.cat-title { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; display: flex; align-items: center; gap: 9px; padding-bottom: 8px; border-bottom: 2px solid; margin-bottom: 13px; }
.cat-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.cat-total { margin-left: auto; font-size: 14px; font-weight: 600; text-transform: none; letter-spacing: 0; font-variant-numeric: tabular-nums; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 340px)); gap: 12px; }
.card { border-radius: 13px; padding: 15px 17px; border: 1px solid; border-left-width: 4px; transition: transform 0.12s, box-shadow 0.12s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
.c-contrat { font-size: 11px; opacity: 0.72; }
.c-sub { font-size: 12.5px; font-weight: 600; margin-top: 1px; }
.c-montant { font-size: 24px; font-weight: 600; margin-top: 9px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
.c-foot { display: flex; align-items: center; gap: 8px; margin-top: 9px; flex-wrap: wrap; }
.delta { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; display: inline-flex; align-items: center; gap: 3px; }
.delta.up { background: #E1F5EE; color: #0F6E56; }
.delta.down { background: #FCEBEB; color: #A32D2D; }
.delta.flat { background: rgba(0,0,0,0.05); color: #888; }
@media (prefers-color-scheme: dark) {
  .delta.up { background: #16402F; color: #7FD9B8; }
  .delta.down { background: #3D1A1A; color: #F09595; }
  .delta.flat { background: rgba(255,255,255,0.08); color: #999; }
}
.c-prev { font-size: 10.5px; opacity: 0.6; }
.c-reste { font-size: 11px; font-style: italic; opacity: 0.75; margin-top: 7px; }

.loading, .empty { text-align: center; padding: 50px; color: #aaa; font-size: 14px; }

/* ---------- Sélecteur de mode ---------- */
.mode-switch { display: inline-flex; margin: 22px 0 4px; border: 1px solid #ddd; border-radius: 9px; overflow: hidden; }
@media (prefers-color-scheme: dark) { .mode-switch { border-color: #3a3a3a; } }
.mode-switch button { font-size: 12.5px; padding: 7px 15px; border: none; background: none; color: inherit; cursor: pointer; font-family: inherit; }
.mode-switch button:hover { background: rgba(55,138,221,0.08); }
.mode-switch button.on { background: #378ADD; color: #fff; font-weight: 600; }

/* ---------- Tableau d'évolution ---------- */
.tbl-wrap { margin-top: 14px; overflow-x: auto; border: 1px solid #e8e8e8; border-radius: 13px; }
@media (prefers-color-scheme: dark) { .tbl-wrap { border-color: #333; } }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: right; padding: 11px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #888; background: #fafaf8; white-space: nowrap; border-bottom: 1px solid #e8e8e8; }
@media (prefers-color-scheme: dark) { .tbl th { background: #202020; color: #999; border-bottom-color: #333; } }
.tbl th.th-ligne { text-align: left; }
.th-badge { display: block; font-size: 8.5px; letter-spacing: .04em; color: #378ADD; margin-top: 2px; }
.cat-row td { padding: 10px 14px 5px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
.cat-row .cat-dot { display: inline-block; margin-right: 7px; vertical-align: middle; }
.tbl tbody tr:hover td { background: rgba(55,138,221,0.045); }
.tbl .cat-row:hover td { background: none; }
.td-ligne { padding: 9px 14px; border-left: 3px solid transparent; white-space: nowrap; }
.td-val { text-align: right; padding: 9px 14px; font-variant-numeric: tabular-nums; white-space: nowrap; }
.td-val.vide { color: #ccc; }
@media (prefers-color-scheme: dark) { .td-val.vide { color: #555; } }
.cell-montant { display: block; }
.cell-delta { display: block; font-size: 10px; font-weight: 600; margin-top: 2px; }
.cell-delta.up { color: #1D9E75; }
.cell-delta.down { color: #E24B4A; }
.total-row td { border-top: 2px solid #e0e0e0; font-weight: 600; padding-top: 11px; padding-bottom: 12px; }
@media (prefers-color-scheme: dark) { .total-row td { border-top-color: #3a3a3a; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <select id="contrat-filter" onchange="onContratChange(this.value)">
      <option value="">Tous les contrats — dernier relevé</option>
    </select>
  </div>
</div>
<div class="wrap" id="wrap"><div class="loading">Chargement…</div></div>

<script>
const CAT_COLORS = {
  'Fonctionnement': { c: '#378ADD', bg: '#EAF3FB', dark: '#16314A', txt: '#0C447C', dtxt: '#9FC6EE' },
  'Équipement':     { c: '#D97B3F', bg: '#FBF0E8', dark: '#3D2A1A', txt: '#8A4A18', dtxt: '#E0A87C' },
  'Personnel':      { c: '#9C6ADE', bg: '#F0EAFB', dark: '#2A1F3D', txt: '#5E3A9E', dtxt: '#C4A6EC' },
  'Prestation':     { c: '#1D9E75', bg: '#EAFBF3', dark: '#16402F', txt: '#0F6E56', dtxt: '#9FE1CB' },
  'Mission':        { c: '#BA9517', bg: '#FBF8E8', dark: '#3D3A1A', txt: '#6B5A0B', dtxt: '#E0CC7C' },
};
const CAT_ORDER = ['Fonctionnement', 'Équipement', 'Personnel', 'Prestation', 'Mission'];
function getCat(label) { for (const k of CAT_ORDER) if (String(label).includes(k)) return k; return 'Autre'; }
function catStyle(c) { return CAT_COLORS[c] || { c:'#999', bg:'#F5F5F3', dark:'#2A2A2A', txt:'#555', dtxt:'#aaa' }; }

let RELEVES = [], LIGNES = {}, MASQUES = new Set(), filterContrat = '', modeReste = false;

function toMs(g){ if(!g)return 0; if(g>1e15)return g/1000; if(g>1e11)return g; return g*1000; }
function fmt(v){ return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(v||0); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function refId(v){ if(v==null)return null; if(typeof v==='number')return v; if(Array.isArray(v))return v[1]; return v; }

function dateLongue(ms) {
  const d = new Date(ms);
  return d.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
}
function joursDepuis(ms) {
  return Math.floor((Date.now() - ms) / 86400000);
}
function sousLibelle(label) {
  const s = String(label||'');
  return s.includes('|') ? s.split('|').slice(1).join('|').trim() : s;
}

async function fetchAll() {
  try {
    const [r, lb, ct] = await Promise.all([
      grist.docApi.fetchTable('Releves_PGM'),
      grist.docApi.fetchTable('Lignes_budgetaires'),
      grist.docApi.fetchTable('Contrats'),
    ]);

    const contratNoms = {}; const contratsMasques = new Set();
    (ct.id||[]).forEach((id,i)=>{
      contratNoms[id] = (ct.Nom||[])[i] || ('#'+id);
      if ((ct.Masquer||[])[i]) { const n=(ct.Nom||[])[i]; if(n) contratsMasques.add(String(n).trim()); }
    });
    const resolContrat = v => { const id = refId(v); return contratNoms[id] || ''; };

    const lignes = {};
    (lb.id||[]).forEach((id,i)=>{
      lignes[id] = { label:(lb.Label||[])[i]||'', contrat:resolContrat((lb.Contrat||[])[i]), reste:(lb.Reste_a_notifier||[])[i]||0 };
    });

    // Le reste à notifier est une donnée du relevé lui-même (historisée)
    const colReste = Array.isArray(r.Reste_a_notifier) ? r.Reste_a_notifier : null;
    const releves = (r.id||[]).map((id,i)=>({
      ligne: refId((r.Ligne_budgetaire||[])[i]),
      date: toMs((r.Date_releve||[])[i]),
      officiel: (r.Disponible_officiel||[])[i] || 0,
      reste: colReste ? (colReste[i] || 0) : null,
    })).filter(x => x.ligne && x.date);

    RELEVES = releves; LIGNES = lignes; MASQUES = contratsMasques;

    // Remplir le sélecteur avec les contrats ayant au moins un relevé
    const contrats = [...new Set(releves.map(x => lignes[x.ligne] && lignes[x.ligne].contrat).filter(Boolean))]
      .filter(c => !contratsMasques.has(String(c).trim()))
      .sort((a,b) => a.localeCompare(b,'fr',{sensitivity:'base'}));
    const sel = document.getElementById('contrat-filter');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Tous les contrats — dernier relevé</option>' +
      contrats.map(c => `<option value="${esc(c)}">${esc(c)} — tous les relevés</option>`).join('');
    if (contrats.includes(cur)) sel.value = cur; else filterContrat = '';

    render();
  } catch(e) {
    document.getElementById('wrap').innerHTML = '<div class="loading">Erreur : ' + esc(e.message) + '</div>';
  }
}

function onContratChange(v) { filterContrat = v; render(); }

function selectContrat(contrat) {
  const sel = document.getElementById('contrat-filter');
  const cible = String(contrat).trim();
  const opt = [...sel.options].find(o => o.value.trim() === cible);
  if (!opt) return;
  sel.value = opt.value;
  filterContrat = opt.value;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Clic sur une carte → historique du contrat (délégation d'événements)
document.getElementById('wrap').addEventListener('click', (e) => {
  const card = e.target.closest('.card[data-contrat]');
  if (!card) return;
  const c = card.getAttribute('data-contrat');
  if (c) selectContrat(c);
});

function render() {
  const releves = RELEVES, lignes = LIGNES, contratsMasques = MASQUES;
  const wrap = document.getElementById('wrap');
  if (!releves.length) { wrap.innerHTML = '<div class="empty">Aucun relevé PGM enregistré.</div>'; return; }
  if (filterContrat) { renderHistorique(); return; }

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;

  // Date du dernier relevé (la plus récente toutes lignes confondues)
  const dates = [...new Set(releves.map(x => x.date))].sort((a,b) => b - a);
  const dLast = dates[0];
  const dPrev = dates[1] || null;

  // Relevés de cette date, en écartant les contrats masqués
  const actuels = releves.filter(x => x.date === dLast && lignes[x.ligne] &&
                                      !contratsMasques.has(String(lignes[x.ligne].contrat).trim()));
  if (!actuels.length) { wrap.innerHTML = '<div class="empty">Aucun relevé à afficher.</div>'; return; }

  // Relevé précédent par ligne (pour la comparaison)
  const precedents = {};
  if (dPrev) releves.filter(x => x.date === dPrev).forEach(x => { precedents[x.ligne] = x.officiel; });

  const total = actuels.reduce((s,x) => s + x.officiel, 0);
  const totalPrev = dPrev
    ? releves.filter(x => x.date === dPrev && lignes[x.ligne] && !contratsMasques.has(String(lignes[x.ligne].contrat).trim()))
             .reduce((s,x) => s + x.officiel, 0)
    : null;

  const resteDe = x => (x.reste != null ? x.reste : (lignes[x.ligne] ? lignes[x.ligne].reste : 0));
  const totalReste = actuels.reduce((s,x) => { const v = resteDe(x); return s + (v > 0 ? v : 0); }, 0);

  const jours = joursDepuis(dLast);
  const agoTxt = jours === 0 ? "aujourd'hui" : jours === 1 ? 'il y a 1 jour' : `il y a ${jours} jours`;

  // ---------- Hero ----------
  let deltaTotalHtml = '';
  if (totalPrev != null) {
    const d = total - totalPrev;
    const signe = d > 0 ? '+' : d < 0 ? '−' : '';
    deltaTotalHtml = `<span class="hstat-delta">${signe} ${fmt(Math.abs(d))}</span>`;
  }

  let html = `
    <div class="hero">
      <div class="hero-label">Dernier relevé PGM</div>
      <div class="hero-date">${dateLongue(dLast)}</div>
      <div class="hero-ago">${agoTxt}</div>
      <div class="hero-stats">
        <div>
          <div class="hstat-label">Disponible officiel total</div>
          <div class="hstat-val">${fmt(total)} ${deltaTotalHtml}</div>
        </div>
        <div>
          <div class="hstat-label">Reste à notifier</div>
          <div class="hstat-val">${fmt(totalReste)}</div>
        </div>
        <div>
          <div class="hstat-label">Lignes relevées</div>
          <div class="hstat-val">${actuels.length}</div>
        </div>
        ${dPrev ? `<div>
          <div class="hstat-label">Relevé précédent</div>
          <div class="hstat-val" style="font-size:17px;">${dateLongue(dPrev)}</div>
        </div>` : ''}
      </div>
    </div>`;

  // ---------- Regroupement par catégorie ----------
  const groupes = {};
  actuels.forEach(x => {
    const l = lignes[x.ligne];
    const cat = getCat(l.label);
    (groupes[cat] = groupes[cat] || []).push({ ...x, label:l.label, contrat:l.contrat });
  });

  const cats = CAT_ORDER.filter(c => groupes[c]).concat(Object.keys(groupes).filter(c => !CAT_ORDER.includes(c)));

  cats.forEach(cat => {
    const st = catStyle(cat);
    const items = groupes[cat];
    // Contrats groupés, ordre alphabétique ; Directs avant Indirects
    const rang = d => { const l = String(d.label).toLowerCase();
      if (l.includes('indirect')) return 1; if (l.includes('direct')) return 0; return 2; };
    const parContrat = {};
    items.forEach(d => { (parContrat[d.contrat] = parContrat[d.contrat] || []).push(d); });
    Object.values(parContrat).forEach(a => a.sort((x,y) => rang(x) - rang(y)));
    const tri = Object.keys(parContrat).sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}))
                  .map(c => parContrat[c]).flat();

    const totalCat = items.reduce((s,x) => s + x.officiel, 0);

    html += `<div class="cat-section">
      <div class="cat-title" style="border-bottom-color:${st.c}; color:${isDark?st.dtxt:st.txt};">
        <span class="cat-dot" style="background:${st.c}"></span>${cat}
        <span class="cat-total">${fmt(totalCat)}</span>
      </div>
      <div class="grid">`;

    tri.forEach(d => {
      const prev = precedents[d.ligne];
      let deltaHtml = '', prevHtml = '';
      if (prev != null) {
        const diff = d.officiel - prev;
        if (Math.abs(diff) < 0.005) {
          deltaHtml = `<span class="delta flat">= inchangé</span>`;
        } else {
          const up = diff > 0;
          deltaHtml = `<span class="delta ${up?'up':'down'}">${up?'▲':'▼'} ${fmt(Math.abs(diff))}</span>`;
        }
        prevHtml = `<span class="c-prev">avant : ${fmt(prev)}</span>`;
      } else {
        deltaHtml = `<span class="delta flat">1<sup>er</sup> relevé</span>`;
      }
      const bg = isDark ? st.dark : st.bg;
      const txt = isDark ? st.dtxt : st.txt;
      const reste = resteDe(d);
      const resteHtml = reste > 0 ? `<div class="c-reste" style="color:${txt}">Reste à notifier : ${fmt(reste)}</div>` : '';
      const cAttr = String(d.contrat||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      html += `
        <div class="card" data-contrat="${cAttr}" title="Voir tous les relevés de ${cAttr}" style="background:${bg}; border-color:${st.c}33; border-left-color:${st.c}; cursor:pointer;">
          <div class="c-contrat" style="color:${txt}">${esc(d.contrat||'—')}</div>
          <div class="c-sub" style="color:${txt}">${esc(sousLibelle(d.label))}</div>
          <div class="c-montant" style="color:${txt}">${fmt(d.officiel)}</div>
          <div class="c-foot">${deltaHtml}${prevHtml}</div>
          ${resteHtml}
        </div>`;
    });

    html += `</div></div>`;
  });

  wrap.innerHTML = html;
}


function dateCourte(ms) {
  return new Date(ms).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'2-digit' });
}

function setMode(m) { modeReste = (m === 'reste'); render(); }

function renderHistorique() {
  const wrap = document.getElementById('wrap');
  const contrat = filterContrat;
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;

  const items = RELEVES.filter(x => LIGNES[x.ligne] && LIGNES[x.ligne].contrat === contrat);
  if (!items.length) { wrap.innerHTML = '<div class="empty">Aucun relevé pour ce contrat.</div>'; return; }

  const resteDe = x => (x.reste != null ? x.reste : (LIGNES[x.ligne] ? LIGNES[x.ligne].reste : 0));
  const valDe = x => modeReste ? resteDe(x) : x.officiel;

  // Dates du plus ancien au plus récent (lecture de l'évolution de gauche à droite)
  const dates = [...new Set(items.map(x => x.date))].sort((a,b) => a - b);
  const dLast = dates[dates.length - 1];
  const totalAt = d => items.filter(x => x.date === d).reduce((s,x) => s + valDe(x), 0);

  const totalLast = totalAt(dLast);
  const totalPrev = dates.length > 1 ? totalAt(dates[dates.length - 2]) : null;

  const jours = joursDepuis(dLast);
  const agoTxt = jours === 0 ? "aujourd'hui" : jours === 1 ? 'il y a 1 jour' : `il y a ${jours} jours`;

  let deltaTotalHtml = '';
  if (totalPrev != null) {
    const d = totalLast - totalPrev;
    const signe = d > 0 ? '+' : d < 0 ? '\u2212' : '';
    deltaTotalHtml = `<span class="hstat-delta">${signe} ${fmt(Math.abs(d))}</span>`;
  }

  // ---------- Hero ----------
  let html = `
    <div class="hero">
      <div class="hero-label">${esc(contrat)}</div>
      <div class="hero-date">${dateLongue(dLast)}</div>
      <div class="hero-ago">Dernier relevé \u00b7 ${agoTxt}</div>
      <div class="hero-stats">
        <div>
          <div class="hstat-label">${modeReste ? 'Reste à notifier' : 'Disponible officiel'}</div>
          <div class="hstat-val">${fmt(totalLast)} ${deltaTotalHtml}</div>
        </div>
        <div>
          <div class="hstat-label">Relevés enregistrés</div>
          <div class="hstat-val">${dates.length}</div>
        </div>
      </div>
    </div>

    <div class="mode-switch">
      <button class="${modeReste?'':'on'}" onclick="setMode('officiel')">Disponible officiel</button>
      <button class="${modeReste?'on':''}" onclick="setMode('reste')">Reste à notifier</button>
    </div>`;

  // ---------- Lignes groupées par catégorie ----------
  const lignesIds = [...new Set(items.map(x => x.ligne))];
  const parCat = {};
  lignesIds.forEach(id => {
    const cat = getCat(LIGNES[id].label);
    (parCat[cat] = parCat[cat] || []).push(id);
  });
  const rang = id => { const l = String(LIGNES[id].label).toLowerCase();
    if (l.includes('indirect')) return 1; if (l.includes('direct')) return 0; return 2; };
  Object.values(parCat).forEach(a => a.sort((x,y) => rang(x) - rang(y)));
  const cats = CAT_ORDER.filter(c => parCat[c]).concat(Object.keys(parCat).filter(c => !CAT_ORDER.includes(c)));

  // Valeur d'une ligne à une date
  const valAt = (ligneId, d) => {
    const row = items.find(x => x.ligne === ligneId && x.date === d);
    return row ? valDe(row) : null;
  };

  const cellule = (v, vPrec) => {
    if (v == null) return '<td class="td-val vide">—</td>';
    let dl = '';
    if (vPrec != null) {
      const diff = v - vPrec;
      if (Math.abs(diff) >= 0.005) {
        const up = diff > 0;
        dl = `<span class="cell-delta ${up?'up':'down'}">${up?'\u25B2':'\u25BC'} ${fmt(Math.abs(diff))}</span>`;
      }
    }
    return `<td class="td-val"><span class="cell-montant">${fmt(v)}</span>${dl}</td>`;
  };

  html += `<div class="tbl-wrap"><table class="tbl">
    <thead><tr><th class="th-ligne">Ligne budgétaire</th>
      ${dates.map((d,i) => `<th>${dateCourte(d)}${i===dates.length-1?'<span class="th-badge">dernier</span>':''}</th>`).join('')}
    </tr></thead><tbody>`;

  cats.forEach(cat => {
    const st = catStyle(cat);
    const col = isDark ? st.dtxt : st.txt;
    html += `<tr class="cat-row"><td colspan="${dates.length+1}" style="color:${col}">
      <span class="cat-dot" style="background:${st.c}"></span>${cat}</td></tr>`;

    parCat[cat].forEach(id => {
      html += `<tr><td class="td-ligne" style="border-left-color:${st.c}">${esc(sousLibelle(LIGNES[id].label))}</td>`;
      dates.forEach((d, i) => {
        const v = valAt(id, d);
        const vPrec = i > 0 ? valAt(id, dates[i-1]) : null;
        html += cellule(v, vPrec);
      });
      html += `</tr>`;
    });
  });

  // Ligne de total
  html += `<tr class="total-row"><td class="td-ligne">Total</td>`;
  dates.forEach((d, i) => {
    const v = totalAt(d);
    const vPrec = i > 0 ? totalAt(dates[i-1]) : null;
    html += cellule(v, vPrec);
  });
  html += `</tr></tbody></table></div>`;

  wrap.innerHTML = html;
}

const gs = document.createElement('script');
gs.src = 'https://docs.getgrist.com/grist-plugin-api.js';
gs.onload = () => { grist.ready({ requiredAccess: 'full' }); fetchAll(); grist.onRecords(fetchAll); };
gs.onerror = () => { document.getElementById('wrap').innerHTML = '<div class="loading">Grist non disponible.</div>'; };
document.head.appendChild(gs);
</script>
</body>
</html>
