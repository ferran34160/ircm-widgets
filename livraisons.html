<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi des livraisons</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 14px; font-size: 13px; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #e8e8e8; } }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
.title { font-size: 15px; font-weight: 500; }
.filters { display: flex; gap: 6px; }
.filter-btn { font-size: 12px; padding: 5px 12px; border: 1px solid #ccc; border-radius: 7px; background: inherit; color: inherit; cursor: pointer; }
.filter-btn.active { background: #378ADD; color: #fff; border-color: #378ADD; }
#dem-filter, #four-filter { font-size: 12px; padding: 5px 10px; border: 1px solid #ccc; border-radius: 7px; background: inherit; color: inherit; cursor: pointer; }
#mail-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
#mail-panel.show { display: flex; }
.mp-card { background: #fff; border-radius: 14px; padding: 18px; max-width: 520px; width: 100%; max-height: 85vh; overflow: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.25); }
@media (prefers-color-scheme: dark) { .mp-card { background: #222; } }
.mp-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.mp-title { font-size: 15px; font-weight: 600; }
.mp-close { background: none; border: none; font-size: 20px; color: #aaa; cursor: pointer; line-height: 1; }
.mp-close:hover { color: #E24B4A; }
.mp-field { margin-bottom: 12px; }
.mp-field label { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: #999; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.mp-copy { font-size: 10px; text-transform: none; letter-spacing: 0; padding: 2px 8px; border: 1px solid #ccc; border-radius: 5px; background: none; color: #378ADD; cursor: pointer; }
.mp-copy:hover { border-color: #378ADD; }
@media (prefers-color-scheme: dark) { .mp-copy { border-color: #444; } }
.mp-val { font-size: 13px; padding: 7px 9px; border: 1px solid #e5e5e5; border-radius: 7px; background: #fafaf8; }
.mp-body { font-size: 12.5px; padding: 10px; border: 1px solid #e5e5e5; border-radius: 7px; background: #fafaf8; white-space: pre-wrap; font-family: inherit; line-height: 1.5; }
@media (prefers-color-scheme: dark) { .mp-val, .mp-body { background: #2a2a2a; border-color: #3a3a3a; } }
.mp-actions { display: flex; gap: 8px; margin-top: 14px; }
.mail-check { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #666; margin: 2px 0 10px; cursor: pointer; user-select: none; }
.mail-check input { width: 14px; height: 14px; cursor: pointer; accent-color: #378ADD; }
.wa-check { margin-top: -4px; }
.wa-check input { accent-color: #25D366; }
@media (prefers-color-scheme: dark) { .mail-check { color: #aaa; } }
.sort-btn { font-size: 12px; padding: 5px 10px; border: 1px solid #ccc; border-radius: 7px; background: inherit; color: inherit; cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.sort-btn:hover { border-color: #378ADD; color: #378ADD; }
.sort-arrow { font-size: 9px; line-height: 1; opacity: 0.35; }
.sort-arrow.on { opacity: 1; color: #378ADD; }
@media (prefers-color-scheme: dark) { .sort-btn { border-color: #444; } }
@media (prefers-color-scheme: dark) { #dem-filter, #four-filter { border-color: #444; } }
@media (prefers-color-scheme: dark) { .filter-btn { border-color: #444; } }
.da-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 420px)); gap: 14px; align-items: start; }
.da-group { background: #fafaf8; border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; }
@media (prefers-color-scheme: dark) { .da-group { background: #202020; border-color: #353535; } }
.da-head { padding: 10px 14px; background: #eef2f6; border-bottom: 1px solid #e0e5ea; }
@media (prefers-color-scheme: dark) { .da-head { background: #283038; border-bottom-color: #38414a; } }
.da-head-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
.da-num { font-size: 14px; font-weight: 600; }
.da-num-date { font-size: 12px; font-weight: 400; color: #888; }
.da-route { font-size: 12px; color: #555; font-weight: 500; }
.da-arrow { color: #aaa; margin: 0 2px; }
.da-bc { color: #888; font-weight: 400; }
@media (prefers-color-scheme: dark) { .da-route { color: #bbb; } }
.da-progress { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 8px; background: rgba(0,0,0,0.07); white-space: nowrap; }
@media (prefers-color-scheme: dark) { .da-progress { background: rgba(255,255,255,0.12); } }
.da-progress.complete { background: #1D9E75; color: #fff; }
.da-days { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 7px; white-space: nowrap; margin-left: 6px; }
.da-days.jaune { background: #FAF0CC; color: #8A7510; }
.da-days.orange { background: #FBE2CC; color: #9A5410; }
.da-days.urgent { background: #E24B4A; color: #fff; }
@media (prefers-color-scheme: dark) { .da-days.jaune { background: #4A4413; color: #E8D77C; } .da-days.orange { background: #4A3318; color: #E8B27C; } }
.da-toggle-recus { margin-top: 8px; font-size: 11px; padding: 3px 10px; border: 1px solid #ccc; border-radius: 6px; background: inherit; color: #378ADD; cursor: pointer; }
.da-toggle-recus:hover { border-color: #378ADD; background: rgba(55,138,221,0.06); }
@media (prefers-color-scheme: dark) { .da-toggle-recus { border-color: #444; } }
.da-body { padding: 10px 14px; }
.art { border: 1px solid #e8e8e8; border-radius: 9px; padding: 10px 12px; margin-bottom: 7px; background: #fff; }
.art:last-child { margin-bottom: 0; }
@media (prefers-color-scheme: dark) { .art { background: #2a2a2a; } }
@media (prefers-color-scheme: dark) { .art { border-color: #383838; } }
.art.recu { background: #F2FAF6; border-color: #C6E8DA; }
@media (prefers-color-scheme: dark) { .art.recu { background: #16291F; border-color: #2C4A3B; } }
.art-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.art-name { font-size: 13px; font-weight: 500; }
.art-ref { font-size: 11px; color: #888; margin-top: 1px; }
.art-dem { font-size: 11px; color: #378ADD; margin-top: 3px; font-weight: 500; }
@media (prefers-color-scheme: dark) { .art-dem { color: #6FB0EC; } }
.art-status { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 7px; white-space: nowrap; }
.art-status.recu { background: #1D9E75; color: #fff; }
.art-status.attente { background: #F0E2C8; color: #8A6D1F; }
@media (prefers-color-scheme: dark) { .art-status.attente { background: #4A3D1A; color: #E0C77C; } }
.art-livraison { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e0e0e0; font-size: 11px; color: #666; display: flex; flex-wrap: wrap; gap: 10px; }
@media (prefers-color-scheme: dark) { .art-livraison { border-top-color: #3a3a3a; color: #aaa; } }
.art-livraison b { font-weight: 500; color: #444; }
@media (prefers-color-scheme: dark) { .art-livraison b { color: #ccc; } }
.form { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e0e0e0; display: none; }
.form.open { display: block; }
@media (prefers-color-scheme: dark) { .form { border-top-color: #3a3a3a; } }
.form-row { display: flex; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
.form-field { flex: 1; min-width: 120px; }
.form-field label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: .03em; display: block; margin-bottom: 2px; }
.form-field input { width: 100%; font-size: 12px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; background: inherit; color: inherit; }
@media (prefers-color-scheme: dark) { .form-field input { border-color: #444; } }
.form-actions { display: flex; gap: 8px; margin-top: 4px; }
.btn { font-size: 12px; padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; }
.btn-save { background: #1D9E75; color: #fff; }
.btn-cancel { background: rgba(0,0,0,0.08); color: inherit; }
@media (prefers-color-scheme: dark) { .btn-cancel { background: rgba(255,255,255,0.12); } }
.btn-edit { font-size: 12px; color: #378ADD; background: none; border: 1px solid #378ADD; border-radius: 6px; cursor: pointer; padding: 5px 12px; margin-top: 8px; }
.btn-edit:hover { background: #378ADD; color: #fff; }
.empty { text-align: center; padding: 30px; color: #aaa; }
.loading { text-align: center; padding: 40px; color: #888; }
</style>
</head>
<body>
<div class="header">
  <div class="title">Suivi des livraisons</div>
  <div class="filters">
    <button class="filter-btn" data-f="tous" onclick="setFilter('tous')">Tous</button>
    <button class="filter-btn active" data-f="attente" onclick="setFilter('attente')">En attente</button>
    <button class="filter-btn" data-f="recu" onclick="setFilter('recu')">Reçus</button>
    <select id="dem-filter" onchange="onDemChange(this.value)"><option value="">Tous les demandeurs</option></select>
    <select id="four-filter" onchange="onFourChange(this.value)"><option value="">Tous les fournisseurs</option></select>
    <button class="sort-btn" id="sort-btn" onclick="toggleSort()" title="Trier par date de réception du BC"></button>
    <button class="sort-btn" id="hide-btn" onclick="toggleHideRecus()" title="Masquer les articles déjà reçus"></button>
  </div>
</div>
<div id="container"><div class="loading">Chargement…</div></div>

<script>
// Table Demandeurs (colonnes : Nom, Email) → adresses des destinataires.
// MODE TEST : mettre une adresse ici pour que TOUS les mails y soient envoyés.
// Laisser vide ('') pour envoyer aux vrais demandeurs.
const MAIL_TEST = '';

// Noms qui ne sont pas des personnes : pas d'e-mail, pas de salutation.
const NOMS_SANS_MAIL = ['Commun'];

let articles = [], dasMap = {}, fourNoms = {}, emailsDem = {}, filter = 'attente', filterDem = '', filterFour = '', sortAsc = true, hideRecus = true;
const montrerRecusDA = new Set();  // DA où l'on force l'affichage des reçus

function fmt(v) { return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(v); }
function toMs(g){ if(!g)return 0; if(g>1e15)return g/1000; if(g>1e11)return g; return g*1000; }
function fmtDate(g){ const ms=toMs(g); if(!ms)return ''; const d=new Date(ms); if(isNaN(d)||d.getFullYear()>3000)return ''; return d.toLocaleDateString('fr-FR'); }
function daysSince(g){ const ms=toMs(g); if(!ms)return null; return Math.floor((Date.now()-ms)/(1000*60*60*24)); }
function dateInput(g){ const ms=toMs(g); if(!ms)return ''; const d=new Date(ms); if(isNaN(d))return ''; return d.toISOString().slice(0,10); }

async function fetchAll() {
  try {
    const [c, d, fo, ct, dm] = await Promise.all([
      grist.docApi.fetchTable('Commandes'),
      grist.docApi.fetchTable('Demandes_achat'),
      grist.docApi.fetchTable('Fournisseurs'),
      grist.docApi.fetchTable('Contrats'),
      grist.docApi.fetchTable('Demandeurs').catch(() => null),
    ]);

    // Nom du demandeur → e-mail (table Demandeurs : colonnes Nom, Email)
    emailsDem = {};
    if (dm) {
      (dm.id||[]).forEach((id,i) => {
        const nom = (dm.Nom||[])[i];
        const mail = (dm.Email||[])[i];
        if (nom && mail) emailsDem[String(nom).trim()] = String(mail).trim();
      });
    }

    const contratNoms = {};
    (ct.id||[]).forEach((id,i)=>{ contratNoms[id]=(ct.Nom||[])[i]||('#'+id); });
    function resolContrat(v){ if(v==null)return''; if(typeof v==='number')return contratNoms[v]||''; if(Array.isArray(v))return contratNoms[v[1]]||''; return String(v); }

    fourNoms = {};
    (fo.id||[]).forEach((id,i)=>{ fourNoms[id]=(fo.Label||[])[i]||(fo.Fournisseur||[])[i]||(fo.Nom||[])[i]||('#'+id); });
    function resolFour(v){ if(v==null)return''; if(typeof v==='number')return fourNoms[v]||''; if(Array.isArray(v))return fourNoms[v[1]]||''; return String(v); }

    dasMap = {};
    (d.id||[]).forEach((id,i)=>{ dasMap[id]={
      num_da:(d.Num_DA||[])[i]||('DA#'+id),
      fournisseur:resolFour((d.Fournisseur||[])[i]),
      contrat:resolContrat((d.Contrat||[])[i]),
      date_da:(d.Date_DA||[])[i], date_pgm:(d.Date_OrderPGM||[])[i], date_bc:(d.Date_reception_BC||[])[i], statut:(d.Statut||[])[i]||'', num_bc:(d.Num_BC||[])[i]||'',
    };});

    articles = (c.id||[]).map((id,i)=>({
      id,
      demande_achat:(c.Demande_achat||[])[i]||null,
      designation:(c.Designation2||[])[i]||'',
      ref:(c.Reference_fournisseur||[])[i]||'',
      qte:(c.Quantite||[])[i]||1,
      montant:(c.Montant2||[])[i]||((c.Prix_unitaire_HT||[])[i]||0)*((c.Quantite||[])[i]||1),
      date_livraison:(c.Date_livraison||[])[i]||null,
      lieu:(c.Lieu_stockage||[])[i]||'',
      recu_par:(c.Recu_par||[])[i]||'',
      notes:(c.Notes_livraison||[])[i]||'',
      type_article:(c.Type_article||[])[i]||'Produit',
      demandeur:(c.Demandeur||[])[i]||null,
    }));

    render();
  } catch(e) {
    document.getElementById('container').innerHTML = '<div class="empty">Erreur: '+e.message+'</div>';
  }
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  render();
}

const MOTS_CLES = ['shipping', 'frais de port', 'transport', 'livraison', 'port ', "frais d'envoi", 'envoi'];

function fmtDemandeur(v) {
  if (v == null) return '';
  if (Array.isArray(v)) return v.slice(1).filter(Boolean).join(', ');
  return String(v);
}
function onDemChange(v) { filterDem = v; render(); }
function onFourChange(v) { filterFour = v; render(); }

function toggleSort() { sortAsc = !sortAsc; render(); }

function toggleHideRecus() { hideRecus = !hideRecus; montrerRecusDA.clear(); render(); }

function toggleRecusDA(key) {
  if (montrerRecusDA.has(key)) montrerRecusDA.delete(key);
  else montrerRecusDA.add(key);
  render();
}

function renderHideBtn() {
  const b = document.getElementById('hide-btn');
  if (!b) return;
  b.innerHTML = hideRecus ? '☑ Masquer les reçus' : '☐ Masquer les reçus';
  b.style.color = hideRecus ? '#378ADD' : '';
  b.style.borderColor = hideRecus ? '#378ADD' : '';
}

function renderSortBtn() {
  const b = document.getElementById('sort-btn');
  if (!b) return;
  b.innerHTML = `Date
    <span style="display:inline-flex; flex-direction:column; gap:1px;">
      <span class="sort-arrow ${sortAsc ? 'on' : ''}">▲</span>
      <span class="sort-arrow ${!sortAsc ? 'on' : ''}">▼</span>
    </span>`;
}

function fillDemFilter() {
  const dems = new Set();
  articles.forEach(a => {
    if (Array.isArray(a.demandeur)) a.demandeur.slice(1).forEach(x => x && dems.add(x));
    else if (a.demandeur) dems.add(a.demandeur);
  });
  const sel = document.getElementById('dem-filter');
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">Tous les demandeurs</option>' +
    [...dems].sort((a,b)=>a.localeCompare(b,'fr')).map(d => `<option value="${d.replace(/"/g,'&quot;')}">${d}</option>`).join('');
  sel.value = cur;
}

function fillFourFilter() {
  const fours = new Set();
  articles.forEach(a => {
    const da = dasMap[a.demande_achat];
    if (da && da.statut === 'BC reçu' && da.fournisseur) fours.add(da.fournisseur);
  });
  const sel = document.getElementById('four-filter');
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">Tous les fournisseurs</option>' +
    [...fours].sort((a,b)=>a.localeCompare(b,'fr')).map(f => `<option value="${f.replace(/"/g,'&quot;')}">${f}</option>`).join('');
  sel.value = cur;
}

function estService(a) {
  if (a.type_article === 'Service') return true;
  const des = (a.designation || '').toLowerCase();
  return MOTS_CLES.some(m => des.includes(m));
}

function render() {
  fillDemFilter();
  fillFourFilter();
  renderSortBtn();
  renderHideBtn();
  const container = document.getElementById('container');

  // Total de productes per DA (excloent serveis), en tenant compte du filtre demandeur
  const matchDem = (a) => {
    if (!filterDem) return true;
    const dems = Array.isArray(a.demandeur) ? a.demandeur.slice(1) : (a.demandeur ? [a.demandeur] : []);
    return dems.includes(filterDem);
  };
  const totauxDA = {};
  articles.forEach(a => {
    const da = dasMap[a.demande_achat];
    if (!da || da.statut !== 'BC reçu') return;
    if (filterFour && da.fournisseur !== filterFour) return;
    if (estService(a)) return;
    if (!matchDem(a)) return;
    const key = a.demande_achat || 'sans';
    if (!totauxDA[key]) totauxDA[key] = { total: 0, recus: 0 };
    totauxDA[key].total += 1;
    if (a.date_livraison) totauxDA[key].recus += 1;
  });

  // Tots els articles de DA "BC reçu" (excloent serveis) — sempre es mostren tots els de la DA
  let arts = articles.filter(a => {
    const da = dasMap[a.demande_achat];
    if (!da || da.statut !== 'BC reçu') return false;
    if (filterFour && da.fournisseur !== filterFour) return false;
    if (estService(a)) return false;
    if (!matchDem(a)) return false;
    return true;
  });

  // Agrupar per DA
  const groups = {};
  arts.forEach(a => {
    const key = a.demande_achat || 'sans';
    (groups[key] = groups[key] || []).push(a);
  });

  // Filtrar a nivell de DA segons l'estat de complecció
  Object.keys(groups).forEach(key => {
    const t = totauxDA[key] || { total: 0, recus: 0 };
    const complete = t.total > 0 && t.recus === t.total;
    if (filter === 'recu' && !complete) delete groups[key];      // Reçus: només DA completes
    if (filter === 'attente' && complete) delete groups[key];     // En attente: només DA amb pendents
  });

  if (Object.keys(groups).length === 0) {
    container.innerHTML = '<div class="empty">Aucune DA.</div>';
    return;
  }

  // Ordenar DA per Date_reception_BC (o PGM/DA si no en té), les més antigues primer
  const keys = Object.keys(groups).sort((a,b) => {
    const ta = dasMap[a] ? (dasMap[a].date_bc || dasMap[a].date_pgm || dasMap[a].date_da || 0) : 0;
    const tb = dasMap[b] ? (dasMap[b].date_bc || dasMap[b].date_pgm || dasMap[b].date_da || 0) : 0;
    return sortAsc ? ta - tb : tb - ta;
  });

  let html = '<div class="da-grid">';
  keys.forEach(key => {
    const da = dasMap[key];
    const arts = groups[key];
    const totaux = totauxDA[key] || { total: arts.length, recus: 0 };

    const numDA = da ? da.num_da : 'Sans DA';
    const dateBC = da && da.date_bc ? fmtDate(da.date_bc) : '';
    const fournisseur = da ? (da.fournisseur || '—') : '—';
    const contrat = da ? (da.contrat || '—') : '—';
    const numBC = da ? da.num_bc : '';

    const complete = totaux.recus === totaux.total && totaux.total > 0;
    // Badge de dies d'espera (només si queden articles pendents)
    const enAttente = totaux.total - totaux.recus;
    let daysBadge = '';
    if (enAttente > 0) {
      const refDate = da && da.date_bc ? da.date_bc : null;
      const days = daysSince(refDate);
      if (days !== null) {
        const daysText = days === 0 ? "aujourd'hui" : days === 1 ? '1 jour' : days + ' jours';
        let dc = 'jaune';
        if (days > 14) dc = 'urgent';
        else if (days >= 7) dc = 'orange';
        daysBadge = `<span class="da-days ${dc}">${daysText}</span>`;
      }
    }

    html += `<div class="da-group">
      <div class="da-head">
        <div class="da-head-top">
          <span class="da-num">${numDA}${dateBC ? ` <span class="da-num-date">/ BC reçu le ${dateBC}</span>` : ''}</span>
          <span style="display:flex; align-items:center;">${daysBadge}<span class="da-progress ${complete ? 'complete' : ''}">${totaux.recus}/${totaux.total} reçus</span></span>
        </div>
        <div class="da-route">${contrat} <span class="da-arrow">→</span> ${fournisseur}${numBC ? ` <span class="da-bc">/ BC ${numBC}</span>` : ''}</div>
        ${(hideRecus && totaux.recus > 0) ? `<button class="da-toggle-recus" onclick="toggleRecusDA('${key}')">${montrerRecusDA.has(key) ? '▲ Masquer les ' + totaux.recus + ' reçu' + (totaux.recus>1?'s':'') : '▼ Voir les ' + totaux.recus + ' reçu' + (totaux.recus>1?'s':'')}</button>` : ''}
      </div>
      <div class="da-body">`;

    const montrerCetteDA = montrerRecusDA.has(key);
    arts.forEach(a => {
      const recu = !!a.date_livraison;
      if (hideRecus && recu && !montrerCetteDA) return;
      html += `
        <div class="art ${recu ? 'recu' : ''}">
          <div class="art-top">
            <div>
              <div class="art-name">${a.qte > 1 ? a.qte + '× ' : ''}${a.designation || '(sans nom)'}</div>
              <div class="art-ref">${a.ref ? 'Réf: ' + a.ref + ' · ' : ''}${fmt(a.montant)}</div>
              ${fmtDemandeur(a.demandeur) ? `<div class="art-dem">👤 ${fmtDemandeur(a.demandeur)}</div>` : ''}
            </div>
            <span class="art-status ${recu ? 'recu' : 'attente'}">${recu ? '✓ Reçu' : 'En attente'}</span>
          </div>
          ${recu ? `<div class="art-livraison">
            <span><b>Livré:</b> ${fmtDate(a.date_livraison)}</span>
            ${a.lieu ? `<span><b>Lieu:</b> ${a.lieu}</span>` : ''}
            ${a.recu_par ? `<span><b>Reçu par:</b> ${a.recu_par}</span>` : ''}
            ${a.notes ? `<span><b>Notes:</b> ${a.notes}</span>` : ''}
          </div>` : ''}
          <button class="btn-edit" onclick="toggleForm(${a.id})">${recu ? 'Modifier' : 'Enregistrer la livraison'}</button>
          <div class="form" id="form-${a.id}">
            <div class="form-row">
              <div class="form-field"><label>Date livraison</label><input type="date" id="date-${a.id}" value="${dateInput(a.date_livraison) || new Date().toISOString().slice(0,10)}"></div>
              <div class="form-field"><label>Lieu stockage</label><input type="text" id="lieu-${a.id}" value="${a.lieu.replace(/"/g,'&quot;')}"></div>
            </div>
            <div class="form-row">
              <div class="form-field"><label>Reçu par</label><input type="text" id="recu-${a.id}" value="${a.recu_par.replace(/"/g,'&quot;')}"></div>
              <div class="form-field"><label>Notes</label><input type="text" id="notes-${a.id}" value="${a.notes.replace(/"/g,'&quot;')}"></div>
            </div>
            <label class="mail-check"><input type="checkbox" id="mail-${a.id}"> ✉ Prévenir par e-mail</label>
            <label class="mail-check wa-check"><input type="checkbox" id="wa-${a.id}"> 📱 Prévenir par WhatsApp</label>
            <div class="form-actions">
              <button class="btn btn-save" onclick="saveLivraison(${a.id})">Enregistrer</button>
              <button class="btn btn-cancel" onclick="toggleForm(${a.id})">Annuler</button>
            </div>
          </div>
        </div>`;
    });

    html += `</div></div>`;
  });
  html += '</div>';

  container.innerHTML = html;
}

function toggleForm(id) {
  const form = document.getElementById('form-' + id);
  if (form) form.classList.toggle('open');
}

function buildMail(a) {
  const da = dasMap[a.demande_achat];
  const numDA = da ? da.num_da : '';
  const noms = Array.isArray(a.demandeur) ? a.demandeur.slice(1).filter(Boolean) : (a.demandeur ? [a.demandeur] : []);
  const personnes = noms.filter(n => !NOMS_SANS_MAIL.includes(n));
  const salut = personnes.length ? ' ' + personnes.join(', ') : '';
  const desig = a.designation || 'votre article';

  // Destinataires : e-mails trouvés dans la table Demandeurs
  let dest;
  if (MAIL_TEST) {
    dest = MAIL_TEST;
  } else {
    const mails = personnes.map(n => emailsDem[n]).filter(Boolean);
    dest = mails.join(',');
    const manquants = personnes.filter(n => !emailsDem[n]);
    if (manquants.length) {
      alert('Aucun e-mail trouvé pour : ' + manquants.join(', ') + '\n(à ajouter dans la table Demandeurs)');
    }
  }

  const sujet = `Votre commande est arrivée / Your order has arrived — ${desig}${numDA ? ' (' + numDA + ')' : ''}`;

  const article = `• ${a.ref ? a.ref + ' — ' : ''}${a.qte > 1 ? a.qte + ' × ' : ''}${desig}`;

  const pucesFR = [
    article,
    (da && da.fournisseur) ? `• Fournisseur : ${da.fournisseur}` : null,
    (da && da.date_da) ? `• Date de la DA : ${fmtDate(da.date_da)}` : null,
    a.lieu ? `• Lieu de stockage : ${a.lieu}` : null,
  ].filter(x => x !== null);

  const pucesEN = [
    article,
    (da && da.fournisseur) ? `• Supplier: ${da.fournisseur}` : null,
    (da && da.date_da) ? `• Purchase request date: ${fmtDate(da.date_da)}` : null,
    a.lieu ? `• Storage location: ${a.lieu}` : null,
  ].filter(x => x !== null);

  const corps = [
    `Bonjour${salut},`,
    '',
    "L'article suivant est arrivé :",
    '',
    ...pucesFR,
    '',
    'Cordialement,',
    '',
    '---',
    '',
    `Hello${salut},`,
    '',
    'The following item has arrived:',
    '',
    ...pucesEN,
    '',
    'Best regards,',
  ].join('\n');

  return { dest, sujet, corps };
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildWhatsApp(a) {
  const da = dasMap[a.demande_achat];
  const numDA = da ? da.num_da : '';
  const noms = Array.isArray(a.demandeur) ? a.demandeur.slice(1).filter(Boolean) : (a.demandeur ? [a.demandeur] : []);
  const personnes = noms.filter(n => !NOMS_SANS_MAIL.includes(n));
  const salut = personnes.length ? ' ' + personnes.join(', ') : '';
  const desig = a.designation || 'votre article';
  const article = `${a.qte > 1 ? a.qte + ' × ' : ''}${desig}`;

  const lignesEN = [
    `Hello${salut},`,
    'The following item has arrived:',
    `📦 ${article}`,
    (da && da.fournisseur) ? `🏢 Supplier: ${da.fournisseur}` : null,
    a.lieu ? `📍 Storage location: ${a.lieu}` : null,
  ].filter(x => x !== null);

  return lignesEN.join('\n');
}

function ouvrirWhatsApp(a) {
  const txt = buildWhatsApp(a);
  navigator.clipboard.writeText(txt).catch(() => {});
  // Ouvre WhatsApp Web (le message est dans le presse-papiers : coller dans le groupe)
  const link = document.createElement('a');
  link.href = 'https://web.whatsapp.com/';
  link.target = '_blank';
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  link.remove();
  alert('Message copié.\nDans WhatsApp, ouvrez le groupe et collez (Ctrl+V).');
}

function ouvrirMail(a) {
  const m = buildMail(a);
  const url = 'mailto:' + encodeURIComponent(m.dest)
    + '?subject=' + encodeURIComponent(m.sujet)
    + '&body=' + encodeURIComponent(m.corps);
  // Un <a> cliqué est plus fiable qu'un window.open dans une iframe
  const link = document.createElement('a');
  link.href = url;
  link.target = '_blank';
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  link.remove();
}

async function saveLivraison(id) {
  const dateVal = document.getElementById('date-' + id).value;
  const lieu = document.getElementById('lieu-' + id).value;
  const recu = document.getElementById('recu-' + id).value;
  const notes = document.getElementById('notes-' + id).value;

  // Convertir data a segons des de epoch (format Grist)
  let dateGrist = null;
  if (dateVal) {
    dateGrist = Math.floor(new Date(dateVal + 'T00:00:00Z').getTime() / 1000);
  }

  try {
    await grist.docApi.applyUserActions([
      ['UpdateRecord', 'Commandes', id, {
        Date_livraison: dateGrist,
        Lieu_stockage: lieu,
        Recu_par: recu,
        Notes_livraison: notes,
      }]
    ]);
    // Notifications (seulement si la date est renseignée et la case cochée)
    const chkMail = document.getElementById('mail-' + id);
    const chkWa = document.getElementById('wa-' + id);
    const art = articles.find(x => x.id === id);
    if (art && dateGrist) {
      const data = { ...art, date_livraison: dateGrist, lieu, notes };
      if (chkMail && chkMail.checked) ouvrirMail(data);
      if (chkWa && chkWa.checked) ouvrirWhatsApp(data);
    }
    await fetchAll();
  } catch(e) {
    alert('Erreur: ' + e.message);
  }
}

function loadData() {
  if (window.grist) {
    grist.ready({ requiredAccess: 'full' });
    fetchAll();
    grist.onRecords(() => fetchAll());
    window.addEventListener('focus', () => fetchAll());
  } else {
    document.getElementById('container').innerHTML = '<div class="empty">Connectez à Grist.</div>';
  }
}
const s = document.createElement('script');
s.src='https://docs.getgrist.com/grist-plugin-api.js';
s.onload=loadData; s.onerror=loadData;
document.head.appendChild(s);
</script>
</body>
</html>
