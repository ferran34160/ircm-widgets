<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Échéances des contrats</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 16px; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #e8e8e8; } }
.header { margin-bottom: 14px; }
.title { font-size: 15px; font-weight: 500; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; align-items: start; }
.card { border-radius: 12px; padding: 13px 15px; border: 1px solid; border-left-width: 4px; cursor: pointer; transition: transform 0.1s; }
.card:not([onclick]) { cursor: default; }
.card:not([onclick]):hover { transform: none; }
.card:hover { transform: translateY(-1px); }
.card.urgent { background: #FCEBEB; border-color: #F7C1C1; border-left-color: #E24B4A; }
.card.warn { background: #FAEEDA; border-color: #FAC775; border-left-color: #BA7517; }
.card.ok { background: #E1F5EE; border-color: #9FE1CB; border-left-color: #1D9E75; }
@media (prefers-color-scheme: dark) {
  .card.urgent { background: #4A1717; border-color: #791F1F; border-left-color: #E24B4A; }
  .card.warn { background: #4A3208; border-color: #854F0B; border-left-color: #EF9F27; }
  .card.ok { background: #0F3D31; border-color: #1D6E56; border-left-color: #1D9E75; }
}
.c-top { display: flex; justify-content: space-between; align-items: flex-start; }
.c-nom { font-size: 14px; font-weight: 500; margin: 0 0 2px; }
.c-fin { font-size: 11px; margin: 0 0 10px; opacity: 0.7; }
.c-chevron { font-size: 12px; opacity: 0.5; transition: transform 0.15s; }
.card.open .c-chevron { transform: rotate(180deg); }
.c-dispo { font-size: 22px; font-weight: 500; margin: 0; }
.c-budget { font-size: 11px; margin: 2px 0 10px; opacity: 0.7; }
.c-ech { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 10px; display: inline-block; }
.card.urgent .c-nom, .card.urgent .c-dispo { color: #791F1F; }
.card.warn .c-nom, .card.warn .c-dispo { color: #633806; }
.card.ok .c-nom, .card.ok .c-dispo { color: #085041; }
.card.urgent .c-ech { background: rgba(162,45,45,0.15); color: #791F1F; }
.card.warn .c-ech { background: rgba(133,79,11,0.15); color: #633806; }
.card.ok .c-ech { background: rgba(15,110,86,0.15); color: #085041; }
@media (prefers-color-scheme: dark) {
  .card.urgent .c-nom, .card.urgent .c-dispo { color: #F7C1C1; }
  .card.warn .c-nom, .card.warn .c-dispo { color: #FAC775; }
  .card.ok .c-nom, .card.ok .c-dispo { color: #9FE1CB; }
  .card.urgent .c-ech { background: rgba(247,193,193,0.15); color: #F7C1C1; }
  .card.warn .c-ech { background: rgba(250,199,117,0.15); color: #FAC775; }
  .card.ok .c-ech { background: rgba(159,225,203,0.15); color: #9FE1CB; }
}
.cats { display: none; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.12); }
@media (prefers-color-scheme: dark) { .cats { border-top-color: rgba(255,255,255,0.15); } }
.card.open .cats { display: block; }
.cat-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; font-size: 11px; gap: 8px; }
.cat-label { opacity: 0.8; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cat-val { font-variant-numeric: tabular-nums; font-weight: 500; flex-shrink: 0; }
.loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
</style>
</head>
<body>
<style>
.header select { font-size: 13px; padding: 5px 10px; border: 1px solid #ccc; border-radius: 6px; background: inherit; color: inherit; cursor: pointer; }
@media (prefers-color-scheme: dark) { .header select { border-color: #444; } }
.header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
</style>
<div class="header">
  <div class="title">Échéances des contrats</div>
  <select id="cat-filter"><option value="">Toutes catégories</option></select>
</div>
<div id="container">
  <div class="loading" id="loading">Chargement…</div>
</div>

<script>
let allData = [];
let contratsMasques = new Set();
let subFilterActif = false;   // vrai quand on filtre sur un sous-libellé précis

function fmt(v) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v);
}

const CAT_ORDER = ['Fonctionnement', 'Équipement', 'Personnel', 'Prestation', 'Mission'];
function getCat(label) { for (const k of CAT_ORDER) if (label.includes(k)) return k; return 'Autre'; }
// Sous-libellé complet : ce qui suit le « | » (ex. « Fonctionnement – Coûts Directs »)
function getSub(label) {
  const parts = String(label).split('|');
  return (parts.length > 1 ? parts.slice(1).join('|') : label).trim();
}
function catRank(label) { const i = CAT_ORDER.indexOf(getCat(label)); return i < 0 ? 99 : i; }

function parseDate(gristDate) {
  if (!gristDate) return null;
  let ms;
  if (gristDate > 1e15) ms = gristDate / 1000;
  else if (gristDate > 1e11) ms = gristDate;
  else ms = gristDate * 1000;
  const d = new Date(ms);
  if (isNaN(d.getTime()) || d.getFullYear() > 3000) return null;
  return d;
}

function monthsUntil(d) {
  if (!d) return null;
  const now = new Date();
  return (d.getFullYear() - now.getFullYear()) * 12 + (d.getMonth() - now.getMonth());
}

function updateView() {
  const v = document.getElementById('cat-filter').value;
  let filtered = allData;
  if (v.startsWith('cat:')) {
    const cat = v.slice(4);
    filtered = allData.filter(d => getCat(d.label) === cat);
  } else if (v.startsWith('sub:')) {
    const sub = v.slice(4);
    filtered = allData.filter(d => getSub(d.label) === sub);
  }
  subFilterActif = v.startsWith('sub:');
  render(filtered);
}

function render(data) {
  const container = document.getElementById('container');

  const contrats = {};
  data.forEach(d => {
    if (!contrats[d.contrat]) {
      contrats[d.contrat] = { nom: d.contrat, date_fin: d.date_fin, disponible: 0, releve: 0, lignes: [], a_annualisee: false };
    }
    const c = contrats[d.contrat];
    c.disponible += d.disponible;
    c.releve += d.montant_releve;
    c.lignes.push(d);
    if (d.annualisee) c.a_annualisee = true;
    // Data de fi del contracte = la MÉS PROPERA entre les seves línies
    const dEff = parseDate(d.date_fin);
    if (dEff) {
      const cur = parseDate(c.date_fin);
      if (!cur || dEff < cur) c.date_fin = d.date_fin;
    }
  });

  let list = Object.values(contrats);
  list.forEach(c => { c.fin = parseDate(c.date_fin); c.mois = monthsUntil(c.fin); });
  list.sort((a, b) => {
    if (a.fin && b.fin) return a.fin - b.fin;
    if (a.fin) return -1;
    if (b.fin) return 1;
    return 0;
  });

  if (list.length === 0) {
    container.innerHTML = '<div class="loading">Aucun contrat.</div>';
    return;
  }

  let html = '<div class="grid">';
  list.forEach(c => {
    let state = 'ok';
    if (c.mois !== null) {
      if (c.mois <= 6) state = 'urgent';
      else if (c.mois <= 12) state = 'warn';
    }

    const finStr = c.fin ? c.fin.toLocaleDateString('fr-FR') : 'Date inconnue';
    let echStr = '';
    if (c.mois !== null) {
      if (c.mois < 0) echStr = 'Terminé';
      else if (c.mois === 0) echStr = 'Ce mois-ci';
      else if (c.mois === 1) echStr = 'Dans 1 mois';
      else echStr = 'Dans ' + c.mois + ' mois';
    } else {
      echStr = '—';
    }

    const cats = c.lignes
      .filter(l => l.montant_releve > 0 || l.disponible !== 0)
      .sort((a, b) => catRank(a.label) - catRank(b.label));

    let catsHtml = '';
    cats.forEach(l => {
      const parts = l.label.split('|');
      const sub = parts.length > 1 ? parts.slice(1).join('|').trim() : l.label;
      const annMark = l.annualisee ? ' <span title="Annualisé" style="opacity:0.7">⏱</span>' : '';
      catsHtml += `
        <div class="cat-row">
          <span class="cat-label">${sub}${annMark}</span>
          <span class="cat-val" style="${l.disponible < 0 ? 'color:#E24B4A' : ''}">${fmt(l.disponible)}</span>
        </div>`;
    });

    html += `
      <div class="card ${state}" ${subFilterActif ? '' : 'onclick="this.classList.toggle(\'open\')"'}>
        <div class="c-top">
          <div>
            <p class="c-nom">${c.nom}</p>
            <p class="c-fin">${c.a_annualisee ? 'Échéance annuelle' : 'Fin'} : ${finStr}${c.a_annualisee ? ' ⏱' : ''}</p>
          </div>
          ${subFilterActif ? '' : '<span class="c-chevron">▼</span>'}
        </div>
        <p class="c-dispo">${fmt(c.disponible)}</p>
        <p class="c-budget">sur ${fmt(c.releve)} du dernier relevé</p>
        <span class="c-ech">${echStr}</span>
        ${subFilterActif ? '' : `<div class="cats">${catsHtml}</div>`}
      </div>`;
  });
  html += '</div>';

  container.innerHTML = html;
}

function toMs(g) { if (!g) return 0; if (g > 1e15) return g/1000; if (g > 1e11) return g; return g*1000; }

// Mapa: ligneId -> {annualise, date_limite} del darrer relevé d'aquesta línia
let limitesParLigne = {};

async function loadReleves() {
  try {
    const rv = await grist.docApi.fetchTable('Releves_PGM');
    const byLigne = {};
    (rv.id||[]).forEach((id,i) => {
      let lg = (rv.Ligne_budgetaire||[])[i];
      if (Array.isArray(lg)) lg = lg[1];
      if (lg == null) return;
      const dateMs = toMs((rv.Date_releve||[])[i]);
      const ann = (rv.Annualise||[])[i] || false;
      const dlim = (rv.Date_limite||[])[i] || null;
      if (!byLigne[lg] || dateMs > byLigne[lg].dateMs) {
        byLigne[lg] = { dateMs, annualise: ann, date_limite: dlim };
      }
    });
    limitesParLigne = byLigne;
  } catch(e) {
    limitesParLigne = {};
  }
}

function loadData() {
  async function loadContratsMasques() {
    try {
      const ct = await grist.docApi.fetchTable('Contrats');
      contratsMasques = new Set();
      (ct.id||[]).forEach((id,i) => {
        if ((ct.Masquer||[])[i]) {
          const nom = (ct.Nom||[])[i];
          if (nom) contratsMasques.add(String(nom).trim());
        }
      });
    } catch(e) {}
  }

  if (window.grist) {
    grist.ready({ requiredAccess: 'full' });
    grist.onRecords(async (records) => {
      await loadReleves();
      await loadContratsMasques();
      allData = records.map(r => {
        const lim = limitesParLigne[r.id];
        // Si la línia és annualisée amb data límit, usar-la com a data d'échéance efectiva
        let dateEff = r.Date_fin_contrat;
        let annualisee = false;
        if (lim && lim.annualise && lim.date_limite) {
          dateEff = lim.date_limite;
          annualisee = true;
        }
        return {
          label:         r.Label || '',
          contrat:       r.Contrat || '',
          date_fin:      dateEff,
          date_fin_reelle: r.Date_fin_contrat,
          annualisee:    annualisee,
          disponible:    r.Disponible || 0,
          budget_ajuste: r.Budget_ajuste || 0,
          montant_releve: r.Montant_dernier_releve || 0,
        };
      }).filter(d => d.label && !contratsMasques.has(String(d.contrat).trim()));

      // Omplir el filtre de categories (ordenades)
      const catsPresents = [...new Set(allData.map(d => getCat(d.label)))]
        .sort((a,b) => CAT_ORDER.indexOf(a) - CAT_ORDER.indexOf(b));
      const sel = document.getElementById('cat-filter');
      const cur = sel.value;

      let html = '<option value="">Toutes catégories</option>';
      catsPresents.forEach(c => {
        // La catégorie entière
        html += `<optgroup label="${c}">`;
        html += `<option value="cat:${c}">${c} (tout)</option>`;
        // Les sous-libellés de cette catégorie
        const subs = [...new Set(allData.filter(d => getCat(d.label) === c).map(d => getSub(d.label)))]
          .sort((a,b) => a.localeCompare(b, 'fr', {sensitivity:'base'}));
        subs.forEach(s => {
          html += `<option value="sub:${s.replace(/"/g,'&quot;')}">${s}</option>`;
        });
        html += '</optgroup>';
      });
      sel.innerHTML = html;
      if (cur) sel.value = cur;

      updateView();
    });
  } else {
    document.getElementById('loading').textContent = 'Connectez ce widget à la table Lignes_budgetaires.';
  }
}

document.getElementById('cat-filter').addEventListener('change', updateView);

const gristScript = document.createElement('script');
gristScript.src = 'https://docs.getgrist.com/grist-plugin-api.js';
gristScript.onload = loadData;
gristScript.onerror = loadData;
document.head.appendChild(gristScript);
</script>
</body>
</html>
