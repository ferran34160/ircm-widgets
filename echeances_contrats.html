<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Échéances des contrats</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 16px; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #e8e8e8; } }
.header { margin-bottom: 14px; }
.title { font-size: 15px; font-weight: 500; }
.row { display: flex; align-items: center; gap: 14px; padding: 11px 14px; border: 1px solid #e8e8e8; border-left: 4px solid #ccc; border-radius: 9px; margin-bottom: 8px; }
@media (prefers-color-scheme: dark) { .row { border-color: #383838; background: #242424; } }
.row.urgent { border-left-color: #E24B4A; }
.row.warn { border-left-color: #BA7517; }
.row.ok { border-left-color: #1D9E75; }
.r-main { flex: 1; min-width: 0; }
.r-nom { font-size: 14px; font-weight: 500; margin: 0; }
.r-fin { font-size: 12px; color: #888; margin: 1px 0 0; }
.r-ech { flex-shrink: 0; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 10px; white-space: nowrap; }
.r-ech.urgent { background: #FCEBEB; color: #A32D2D; }
.r-ech.warn { background: #FAEEDA; color: #854F0B; }
.r-ech.ok { background: #E1F5EE; color: #0F6E56; }
@media (prefers-color-scheme: dark) {
  .r-ech.urgent { background: #4A1717; color: #F09595; }
  .r-ech.warn { background: #4A3208; color: #EF9F27; }
  .r-ech.ok { background: #0F3D31; color: #5DCAA5; }
}
.r-dispo { flex-shrink: 0; text-align: right; min-width: 110px; }
.r-dispo-val { font-size: 16px; font-weight: 500; }
.r-dispo-val.urgent { color: #A32D2D; }
.r-dispo-val.warn { color: #854F0B; }
.r-dispo-val.ok { color: #0F6E56; }
@media (prefers-color-scheme: dark) {
  .r-dispo-val.urgent { color: #F09595; }
  .r-dispo-val.warn { color: #EF9F27; }
  .r-dispo-val.ok { color: #5DCAA5; }
}
.r-dispo-sub { font-size: 10px; color: #999; }
.loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <div class="title">Échéances des contrats</div>
</div>
<div id="container">
  <div class="loading" id="loading">Chargement…</div>
</div>

<script>
let allData = [];

function fmt(v) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(v);
}

function parseDate(gristDate) {
  if (!gristDate) return null;
  let ms;
  if (gristDate > 1e15) ms = gristDate / 1000;
  else if (gristDate > 1e11) ms = gristDate;
  else ms = gristDate * 1000;
  const d = new Date(ms);
  if (isNaN(d.getTime()) || d.getFullYear() > 3000) return null;
  return d;
}

function monthsUntil(d) {
  if (!d) return null;
  const now = new Date();
  return (d.getFullYear() - now.getFullYear()) * 12 + (d.getMonth() - now.getMonth());
}

function render(data) {
  const container = document.getElementById('container');

  const contrats = {};
  data.forEach(d => {
    if (!contrats[d.contrat]) {
      contrats[d.contrat] = { nom: d.contrat, date_fin: d.date_fin, disponible: 0, budget: 0 };
    }
    contrats[d.contrat].disponible += d.disponible;
    contrats[d.contrat].budget += d.budget_ajuste;
    if (!contrats[d.contrat].date_fin && d.date_fin) contrats[d.contrat].date_fin = d.date_fin;
  });

  let list = Object.values(contrats);
  list.forEach(c => { c.fin = parseDate(c.date_fin); c.mois = monthsUntil(c.fin); });
  list.sort((a, b) => {
    if (a.fin && b.fin) return a.fin - b.fin;
    if (a.fin) return -1;
    if (b.fin) return 1;
    return 0;
  });

  if (list.length === 0) {
    container.innerHTML = '<div class="loading">Aucun contrat.</div>';
    return;
  }

  let html = '';
  list.forEach(c => {
    let state = 'ok';
    if (c.mois !== null) {
      if (c.mois <= 6) state = 'urgent';
      else if (c.mois <= 12) state = 'warn';
    }

    const finStr = c.fin ? c.fin.toLocaleDateString('fr-FR') : 'Date inconnue';
    let echStr = '';
    if (c.mois !== null) {
      if (c.mois < 0) echStr = 'Terminé';
      else if (c.mois === 0) echStr = 'Ce mois-ci';
      else if (c.mois === 1) echStr = 'Dans 1 mois';
      else echStr = 'Dans ' + c.mois + ' mois';
    } else {
      echStr = '—';
    }

    html += `
      <div class="row ${state}">
        <div class="r-main">
          <p class="r-nom">${c.nom}</p>
          <p class="r-fin">Fin : ${finStr}</p>
        </div>
        <span class="r-ech ${state}">${echStr}</span>
        <div class="r-dispo">
          <div class="r-dispo-val ${state}">${fmt(c.disponible)}</div>
          <div class="r-dispo-sub">sur ${fmt(c.budget)}</div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function loadData() {
  if (window.grist) {
    grist.ready({ requiredAccess: 'read table' });
    grist.onRecords((records) => {
      allData = records.map(r => ({
        label:         r.Label || '',
        contrat:       r.Contrat || '',
        date_fin:      r.Date_fin_contrat,
        disponible:    r.Disponible || 0,
        budget_ajuste: r.Budget_ajuste || 0,
      })).filter(d => d.label);

      render(allData);
    });
  } else {
    document.getElementById('loading').textContent = 'Connectez ce widget à la table Lignes_budgetaires.';
  }
}

const gristScript = document.createElement('script');
gristScript.src = 'https://docs.getgrist.com/grist-plugin-api.js';
gristScript.onload = loadData;
gristScript.onerror = loadData;
document.head.appendChild(gristScript);
</script>
</body>
</html>
