<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion des DA</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 14px; font-size: 13px; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #e8e8e8; } }
.toolbar { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.tab { font-size: 12px; padding: 6px 12px; border-radius: 7px; border: 1px solid #ccc; background: inherit; color: inherit; cursor: pointer; }
.tab.active { background: #378ADD; color: #fff; border-color: #378ADD; }
.bc-search { margin-left: 6px; }
.bc-search input { font-size: 12px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 7px; background: inherit; color: inherit; width: 130px; }
.bc-search input:focus { outline: none; border-color: #378ADD; }
@media (prefers-color-scheme: dark) { .bc-search input { border-color: #444; } }
.libres-card { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; padding: 18px 16px; border-radius: 12px; background: #9C6ADE; color: #fff; cursor: pointer; box-shadow: 0 2px 6px rgba(156,106,222,0.25); width: 130px; margin-top: 12px; }
.libres-card:hover { background: #875BC8; }
.libres-card.active { box-shadow: 0 0 0 3px rgba(156,106,222,0.4); }
.libres-icon { width: 44px; height: 44px; border-radius: 11px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 24px; }
@media (prefers-color-scheme: dark) { .tab { border-color: #444; } }
.spacer { flex: 1; }
.btn-new { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: 8px; border: none; background: #1D9E75; color: #fff; cursor: pointer; box-shadow: 0 1px 3px rgba(29,158,117,0.3); }
.btn-new:hover { background: #178A65; }
.refresh { font-size: 13px; padding: 5px 10px; border: 1px solid #ccc; border-radius: 6px; background: inherit; color: inherit; cursor: pointer; }
@media (prefers-color-scheme: dark) { .refresh { border-color: #444; } }
.layout { display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: start; }
@media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }
.inner-layout { display: grid; grid-template-columns: 300px 1fr; gap: 14px; align-items: start; }
@media (max-width: 720px) { .inner-layout { grid-template-columns: 1fr; } }
.panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #999; margin-bottom: 8px; }
.filters-row { display: flex; gap: 6px; margin-bottom: 8px; }
.four-filter { flex: 1; min-width: 0; font-size: 12px; padding: 6px 9px; border-radius: 7px; border: 1px solid #ccc; background: inherit; color: inherit; }
@media (prefers-color-scheme: dark) { .four-filter { border-color: #444; } }
.da-list { display: flex; flex-direction: column; gap: 6px; max-height: 600px; overflow-y: auto; }
.new-da-card { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; padding: 18px 16px; border-radius: 12px; background: #1D9E75; color: #fff; cursor: pointer; box-shadow: 0 2px 6px rgba(29,158,117,0.25); width: 130px; }
.new-da-card:hover { background: #178A65; }
.new-da-icon { width: 44px; height: 44px; border-radius: 11px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 300; }
.new-da-title { font-size: 14px; font-weight: 600; }
.new-da-sub { font-size: 11px; opacity: 0.85; }
.da-item { border: 1px solid #e5e5e5; border-radius: 9px; padding: 9px 11px; cursor: pointer; }
@media (prefers-color-scheme: dark) { .da-item { border-color: #383838; } }
.da-item.sel { border-color: #378ADD; border-width: 1.5px; background: #E6F1FB; }
@media (prefers-color-scheme: dark) { .da-item.sel { background: #0C2D4D; } }
.da-item.libres { border-style: dashed; border-color: #BA7517; }
.da-item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.da-item-num { font-size: 13px; font-weight: 600; }
.badge { font-size: 10px; padding: 1px 7px; border-radius: 6px; white-space: nowrap; }
.b-cours { background: #F1EFE8; color: #5F5E5A; }
.b-pgm { background: #E6F1FB; color: #0C447C; }
.b-bc { background: #E1F5EE; color: #085041; }
.b-libres { background: #FAEEDA; color: #854F0B; }
@media (prefers-color-scheme: dark) {
  .b-cours { background: #444441; color: #D3D1C7; }
  .b-pgm { background: #0C447C; color: #B5D4F4; }
  .b-bc { background: #085041; color: #9FE1CB; }
  .b-libres { background: #633806; color: #FAC775; }
}
.da-item-meta { font-size: 11px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.da-item-foot { display: flex; justify-content: space-between; margin-top: 5px; font-size: 11px; }
.da-item-total { font-weight: 500; }
.detail { border: 1px solid #e5e5e5; border-radius: 11px; overflow: hidden; max-width: 640px; }
@media (prefers-color-scheme: dark) { .detail { border-color: #383838; } }
.detail-head { background: #eef2f6; padding: 11px 13px; }
@media (prefers-color-scheme: dark) { .detail-head { background: #283038; } }
.detail-head-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.detail-num { font-size: 15px; font-weight: 600; }
.detail-route { font-size: 12px; color: #666; }
@media (prefers-color-scheme: dark) { .detail-route { color: #aaa; } }
.detail-arts { padding: 8px 13px; }
.art { display: flex; justify-content: space-between; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
@media (prefers-color-scheme: dark) { .art { border-bottom-color: #2e2e2e; } }
.art:last-child { border-bottom: none; }
.art-name { word-break: break-word; }
.art-main { display: flex; justify-content: space-between; gap: 10px; }
.art-dem { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.dem-tag { font-size: 10px; padding: 1px 7px; border-radius: 5px; background: #EFEAF8; color: #5E3A9E; }
@media (prefers-color-scheme: dark) { .dem-tag { background: #2E2440; color: #C4A8E8; } }
.art-ref { color: #999; font-size: 11px; font-weight: 400; white-space: nowrap; }
@media (prefers-color-scheme: dark) { .art-ref { color: #888; } }
.art.svc { font-style: italic; opacity: 0.6; font-size: 11px; }
.art-price { white-space: nowrap; font-variant-numeric: tabular-nums; }
.art-right { display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
.art-livr { font-size: 10px; padding: 1px 7px; border-radius: 5px; white-space: nowrap; }
.art-livr.recu { background: #E1F5EE; color: #1D9E75; }
.art-livr.attente { background: rgba(0,0,0,0.06); color: #999; }
@media (prefers-color-scheme: dark) { .art-livr.recu { background: #16291F; color: #5FCFA0; } .art-livr.attente { background: rgba(255,255,255,0.08); color: #888; } }
.art-devise { font-size: 10px; color: #B8860B; font-style: italic; margin-top: 2px; }
@media (prefers-color-scheme: dark) { .art-devise { color: #E0C060; } }
.detail-action { padding: 13px; border-top: 1px solid #eee; }
.detail-action-title { font-size: 11px; text-transform: uppercase; letter-spacing: .03em; color: #999; margin-bottom: 8px; }
.detail-action-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.detail-action-row input { font-size: 13px; padding: 7px 10px; border-radius: 6px; border: 1px solid #ccc; background: inherit; color: inherit; }
@media (prefers-color-scheme: dark) { .detail-action-row input { border-color: #444; } .detail-action { border-top-color: #333; } }
.btn-pgm { font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: 7px; border: none; background: #378ADD; color: #fff; cursor: pointer; }
.btn-pgm:hover { background: #2D72BD; }
.detail-files { padding: 11px 13px; border-top: 1px solid #eee; }
@media (prefers-color-scheme: dark) { .detail-files { border-top-color: #333; } }
.detail-files-title { font-size: 11px; text-transform: uppercase; letter-spacing: .03em; color: #999; margin-bottom: 8px; }
.detail-files-row { display: flex; gap: 8px; flex-wrap: wrap; }
.file-cat { display: flex; gap: 4px; }
.file-link { font-size: 12px; padding: 4px 11px; border-radius: 6px; background: #E6F1FB; color: #0C447C; text-decoration: none; border: 1px solid #C5DFF5; cursor: pointer; }
.file-link:hover { background: #D5E8FA; }
.file-empty { font-size: 12px; padding: 4px 11px; border-radius: 6px; background: #f2f2f0; color: #bbb; border: 1px dashed #ddd; }
@media (prefers-color-scheme: dark) {
  .file-link { background: #0C2D4D; color: #9FC6F0; border-color: #1A4570; }
  .file-empty { background: #2a2a2a; color: #666; border-color: #444; }
}
.detail-foot { display: flex; justify-content: space-between; padding: 10px 13px; border-top: 1px solid #eee; background: #fafafa; }
.detail-dates { font-size: 11px; color: #999; margin-top: 3px; }
.total-devise { font-size: 11px; color: #B8860B; font-style: italic; text-align: right; padding: 4px 13px 8px; background: #fafafa; }
.da-item-livr { margin-top: 5px; }
.da-livr { font-size: 10px; padding: 1px 7px; border-radius: 5px; }
.da-livr.all { background: #E1F5EE; color: #1D9E75; }
.da-livr.partial { background: #FBF3E0; color: #BA7517; }
.da-livr.none { background: rgba(0,0,0,0.06); color: #999; }
@media (prefers-color-scheme: dark) { .da-livr.all { background: #16291F; color: #5FCFA0; } .da-livr.partial { background: #332B16; color: #E0C060; } .da-livr.none { background: rgba(255,255,255,0.08); color: #888; } }
@media (prefers-color-scheme: dark) { .total-devise { color: #E0C060; background: #242424; } }
@media (prefers-color-scheme: dark) { .detail-foot { background: #242424; border-top-color: #333; } }
.detail-total { font-weight: 600; font-size: 14px; }
.empty { text-align: center; padding: 40px 20px; color: #aaa; font-size: 13px; }
.loading { text-align: center; padding: 40px; color: #888; }
/* Assignació */
.assign-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.assign-toolbar { display: flex; gap: 6px; margin-bottom: 8px; }
.assign-toolbar button { font-size: 11px; padding: 4px 9px; border: 1px solid #ccc; border-radius: 6px; background: inherit; color: inherit; cursor: pointer; }
@media (prefers-color-scheme: dark) { .assign-toolbar button { border-color: #444; } }
.assign-da-select { width: 100%; font-size: 13px; padding: 7px 10px; border-radius: 6px; border: 1px solid #ccc; background: inherit; color: inherit; margin-bottom: 10px; }
@media (prefers-color-scheme: dark) { .assign-da-select { border-color: #444; } }
.assign-art { display: flex; align-items: center; gap: 10px; padding: 8px 11px; border: 1px solid #e5e5e5; border-radius: 8px; margin-bottom: 5px; cursor: pointer; }
@media (prefers-color-scheme: dark) { .assign-art { border-color: #383838; } }
.assign-art.checked { background: #E6F1FB; border-color: #378ADD; }
@media (prefers-color-scheme: dark) { .assign-art.checked { background: #0C2D4D; } }
.assign-check { width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid #bbb; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: transparent; }
.assign-art.checked .assign-check { background: #378ADD; border-color: #378ADD; color: #fff; }
.assign-art-info { flex: 1; min-width: 0; }
.assign-art-name { font-size: 12px; font-weight: 500; }
.assign-art-meta { font-size: 11px; color: #888; }
.btn-assign { width: 100%; margin-top: 10px; padding: 10px; background: #378ADD; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-assign:disabled { background: #ccc; cursor: not-allowed; }
@media (prefers-color-scheme: dark) { .btn-assign:disabled { background: #444; } }
.msg { text-align: center; padding: 9px; border-radius: 8px; margin-top: 10px; font-size: 12px; display: none; }
.msg.ok { background: #E1F5EE; color: #085041; display: block; }
.msg.err { background: #FCEBEB; color: #A32D2D; display: block; }
.btn-delete { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #E24B4A; color: #E24B4A; background: none; cursor: pointer; }
.btn-delete:hover { background: #E24B4A; color: #fff; }
.delete-confirm { padding: 11px 13px; border-top: 1px solid #eee; display: none; }
.delete-confirm.open { display: block; }
@media (prefers-color-scheme: dark) { .delete-confirm { border-top-color: #333; } }
.delete-confirm-title { font-size: 11px; color: #E24B4A; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 8px; }
.delete-confirm-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-del-only { font-size: 12px; font-weight: 500; padding: 7px 14px; border-radius: 7px; border: none; background: #E24B4A; color: #fff; cursor: pointer; }
.btn-del-only:hover { background: #c73e3d; }
.btn-del-all { font-size: 12px; font-weight: 500; padding: 7px 14px; border-radius: 7px; border: 1px solid #E24B4A; color: #E24B4A; background: none; cursor: pointer; }
.btn-del-all:hover { background: #FCEBEB; }
.btn-del-cancel { font-size: 12px; padding: 7px 14px; border-radius: 7px; border: 1px solid #ccc; color: inherit; background: none; cursor: pointer; }
@media (prefers-color-scheme: dark) { .btn-del-cancel { border-color: #444; } }
</style>
</head>
<body>
<div id="container"><div class="loading">Chargement…</div></div>

<script>
let das = [], commandes = [], contratNoms = {}, fourNoms = {};
let contratsList = [], fournisseursList = [], lignesList = [];
let tab = 'toutes', selectedDA = null, selectedArts = new Set(), filterFour = '', filterDem = '', searchBC = '';

function fmt(v) { return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(v); }
function toMs(g){ if(!g)return 0; if(g>1e15)return g/1000; if(g>1e11)return g; return g*1000; }
function fmtDate(g){ const ms=toMs(g); if(!ms)return ''; const d=new Date(ms); if(isNaN(d)||d.getFullYear()>3000)return ''; return d.toLocaleDateString('fr-FR'); }

function attachIds(v){
  // Grist attachments via fetchTable: ['L', id1, id2, ...] o null/[]
  if (!v) return [];
  if (Array.isArray(v)) {
    if (v[0] === 'L') return v.slice(1).filter(x => typeof x === 'number');
    return v.filter(x => typeof x === 'number');
  }
  if (typeof v === 'number') return [v];
  return [];
}

function resolveContrat(v){ if(v==null)return''; if(typeof v==='number')return contratNoms[v]||''; if(Array.isArray(v))return contratNoms[v[1]]||''; return String(v); }
function resolveFour(v){ if(v==null)return''; if(typeof v==='number')return fourNoms[v]||''; if(Array.isArray(v))return fourNoms[v[1]]||''; return String(v); }

async function fetchAll() {
  try {
    const [d, c, ct, fo, lb] = await Promise.all([
      grist.docApi.fetchTable('Demandes_achat'),
      grist.docApi.fetchTable('Commandes'),
      grist.docApi.fetchTable('Contrats'),
      grist.docApi.fetchTable('Fournisseurs'),
      grist.docApi.fetchTable('Lignes_budgetaires'),
    ]);

    contratNoms = {};
    contratsList = [];
    (ct.id||[]).forEach((id,i)=>{ contratNoms[id]=(ct.Nom||[])[i]||('#'+id); contratsList.push({id, nom:contratNoms[id]}); });
    fourNoms = {};
    fournisseursList = [];
    (fo.id||[]).forEach((id,i)=>{ fourNoms[id]=(fo.Label||[])[i]||(fo.Fournisseur||[])[i]||(fo.Nom||[])[i]||('#'+id); fournisseursList.push({id, nom:fourNoms[id]}); });
    lignesList = (lb.id||[]).map((id,i)=>({
      id,
      label:(lb.Label||[])[i]||'',
      contrat:(lb.Contrat||[])[i],
    }));

    das = (d.id||[]).map((id,i)=>({
      id,
      num_da:(d.Num_DA||[])[i]||('DA#'+id),
      contrat:resolveContrat((d.Contrat||[])[i]),
      fournisseur:resolveFour((d.Fournisseur||[])[i]),
      date_da:(d.Date_DA||[])[i],
      date_pgm:(d.Date_OrderPGM||[])[i],
      statut:(d.Statut||[])[i]||'',
      num_bc:(d.Num_BC||[])[i]||'',
      pj:(d.PJ||[])[i]||null,
      bc:(d.BC||[])[i]||null,
      da:(d.DA||[])[i]||null,
      autres:(d.Autres||[])[i]||null,
    }));

    commandes = (c.id||[]).map((id,i)=>({
      id,
      demande_achat:(c.Demande_achat||[])[i]||null,
      designation:(c.Designation2||[])[i]||'',
      ref:(c.Reference_fournisseur||[])[i]||'',
      qte:(c.Quantite||[])[i]||1,
      montant:(c.Montant2||[])[i]||((c.Prix_unitaire_HT||[])[i]||0)*((c.Quantite||[])[i]||1),
      type_article:(c.Type_article||[])[i]||'Produit',
      demandeur:(c.Demandeur||[])[i]||null,
      devise:(c.Devise||[])[i]||'EUR',
      prix:(c.Prix_unitaire_HT||[])[i]||0,
      taux:(c.Taux_change||[])[i]||1,
      statut_livr:(c.Statut_livraison||[])[i]||'',
    }));

    render();
  } catch(e) {
    document.getElementById('container').innerHTML = '<div class="empty">Erreur: '+e.message+'</div>';
  }
}

function setTab(t) {
  tab = t;
  selectedDA = null;
  selectedArts.clear();
  render();
}

function choixList(v) {
  // Choix multiple via fetchTable: ['L', 'a', 'b'] o array simple
  if (!v) return [];
  if (Array.isArray(v)) {
    if (v[0] === 'L') return v.slice(1);
    return v;
  }
  return [String(v)];
}

function artsOf(daId) { return commandes.filter(c => c.demande_achat === daId); }
function totalOf(daId) { return artsOf(daId).reduce((s,a)=>s+a.montant,0); }
function nbProduits(daId) { return artsOf(daId).filter(a=>a.type_article!=='Service').length; }

function badgeClass(statut) {
  if (statut === 'En cours') return 'b-cours';
  if (statut === 'Envoyée PGM') return 'b-pgm';
  if (statut === 'BC reçu') return 'b-bc';
  return 'b-cours';
}

function render() {
  if (tab === 'nouvelle') { renderFrame(renderNewDAContent()); return; }
  if (tab === 'libres') { renderFrame(renderLibresContent()); return; }
  renderFrame(renderListContent());
}

// Marc comú: botó Nouvelle DA (esquerra) + filtres (a sobre de la columna central)
function renderFrame(centerAndRight) {
  const container = document.getElementById('container');
  container.innerHTML = `
    <div class="layout">
      <div class="panel">
        <div class="new-da-card" onclick="openNewDA()">
          <div class="new-da-icon">+</div>
          <div>
            <div class="new-da-title">Nouvelle DA</div>
            <div class="new-da-sub">Créer une demande d'achat</div>
          </div>
        </div>
        <div class="libres-card ${tab==='libres'?'active':''}" onclick="setTab('libres')">
          <div class="libres-icon">📋</div>
          <div>
            <div class="new-da-title">Articles libres</div>
            <div class="new-da-sub">Assigner des articles à une DA</div>
          </div>
        </div>
      </div>
      <div class="panel" style="grid-column: span 2;">
        <div class="toolbar">
          <button class="tab ${tab==='toutes'?'active':''}" onclick="setTab('toutes')">Toutes</button>
          <button class="tab ${tab==='En cours'?'active':''}" onclick="setTab('En cours')">En cours</button>
          <button class="tab ${tab==='Envoyée PGM'?'active':''}" onclick="setTab('Envoyée PGM')">Envoyée PGM</button>
          <button class="tab ${tab==='BC reçu'?'active':''}" onclick="setTab('BC reçu')">BC reçu</button>
          <div class="bc-search">
            <input type="text" id="bc-search-input" placeholder="🔍 N° BC…" value="${searchBC.replace(/"/g,'&quot;')}" oninput="onSearchBC(this.value)">
          </div>
        </div>
        <div class="frame-content">${centerAndRight}</div>
      </div>
    </div>`;
}

// Contingut de la vista llista (columna llista + detall)
function renderListContent() {
  let list = das.slice().filter(d => d.statut !== 'Annulée');
  if (tab !== 'toutes') list = list.filter(d => d.statut === tab);
  if (filterFour) list = list.filter(d => d.fournisseur === filterFour);
  if (filterDem) list = list.filter(d => demandeursOfDA(d.id).has(filterDem));
  if (searchBC.trim()) {
    const q = searchBC.trim().toLowerCase();
    list = list.filter(d => (d.num_bc || '').toLowerCase().includes(q));
  }
  list.sort((a,b) => String(b.num_da).localeCompare(String(a.num_da), undefined, {numeric:true}));

  const nbLibres = commandes.filter(c => !c.demande_achat).length;

  // Desplegable de proveïdors (només els que apareixen en alguna DA)
  const foursPresents = [...new Set(das.map(d => d.fournisseur).filter(Boolean))]
    .sort((a,b) => a.localeCompare(b, 'fr', {sensitivity:'base'}));
  const fourOptions = '<option value="">Tous les fournisseurs</option>' +
    foursPresents.map(f => `<option value="${f.replace(/"/g,'&quot;')}" ${filterFour===f?'selected':''}>${f}</option>`).join('');

  // Demandeurs presents en algun article
  const demsPresents = [...new Set(commandes.flatMap(c => choixList(c.demandeur)))]
    .filter(Boolean).sort((a,b) => a.localeCompare(b, 'fr', {sensitivity:'base'}));
  const demOptions = '<option value="">Tous les demandeurs</option>' +
    demsPresents.map(x => `<option value="${x.replace(/"/g,'&quot;')}" ${filterDem===x?'selected':''}>${x}</option>`).join('');

  let listHtml = '';
  list.forEach(d => {
    const sel = selectedDA === d.id ? 'sel' : '';
    const nb = nbProduits(d.id);
    const dProds = artsOf(d.id).filter(a => a.type_article !== 'Service');
    const nbRecus = dProds.filter(a => a.statut_livr === 'Reçu').length;
    let livrBadge = '';
    if (dProds.length && (d.statut === 'Envoyée PGM' || d.statut === 'BC reçu')) {
      const tous = nbRecus === dProds.length;
      const cls = tous ? 'all' : (nbRecus > 0 ? 'partial' : 'none');
      livrBadge = `<span class="da-livr ${cls}">${nbRecus}/${dProds.length} livrés</span>`;
    }
    listHtml += `
      <div class="da-item ${sel}" data-da="${d.id}" onclick="selectDA(${d.id})">
        <div class="da-item-top"><span class="da-item-num">${d.num_da}</span><span class="badge ${badgeClass(d.statut)}">${d.statut}</span></div>
        <div class="da-item-meta">${d.contrat || '—'} → ${d.fournisseur || '—'}</div>
        <div class="da-item-foot"><span style="color:#999">${nb} art. · ${(d.statut==='Envoyée PGM'||d.statut==='BC reçu') ? 'PGM '+fmtDate(d.date_pgm) : fmtDate(d.date_da)}</span><span class="da-item-total">${fmt(totalOf(d.id))}</span></div>
        ${livrBadge ? `<div class="da-item-livr">${livrBadge}</div>` : ''}
      </div>`;
  });
  if (!listHtml) listHtml = '<div class="empty">Aucune DA.</div>';

  let detailHtml;
  if (selectedDA) {
    const d = das.find(x => x.id === selectedDA);
    detailHtml = renderDetail(d);
  } else {
    detailHtml = '<div class="empty">Sélectionnez une DA pour voir le détail.</div>';
  }

  return `
    <div class="inner-layout">
      <div>
        <div class="panel-title">Demandes d'achat (${list.length})${nbLibres ? ' · ' + nbLibres + ' art. libres' : ''}</div>
        <div class="filters-row">
          <select class="four-filter" onchange="setFilterFour(this.value)">${fourOptions}</select>
          <select class="four-filter" onchange="setFilterDem(this.value)">${demOptions}</select>
        </div>
        <div class="da-list">${listHtml}</div>
      </div>
      <div>
        <div class="panel-title">Détail</div>
        ${detailHtml}
      </div>
    </div>`;
}

function renderDetail(d) {
  if (!d) return '<div class="empty">DA introuvable.</div>';
  const arts = artsOf(d.id);
  const total = totalOf(d.id);
  const nbProd = arts.filter(a=>a.type_article!=='Service').length;
  const nbServ = arts.filter(a=>a.type_article==='Service').length;

  let artsHtml = arts.length ? arts.map(a => {
    const dems = choixList(a.demandeur);
    const demHtml = dems.length ? `<div class="art-dem">${dems.map(x=>`<span class="dem-tag">${x}</span>`).join('')}</div>` : '';
    let deviseHtml = '';
    if (a.devise && a.devise !== 'EUR') {
      const origTotal = (a.prix || 0) * (a.qte || 1);
      const symbols = { USD: '$', GBP: '£', CHF: 'CHF ', JPY: '¥' };
      const sym = symbols[a.devise] || (a.devise + ' ');
      const origStr = a.devise === 'USD' || a.devise === 'GBP'
        ? sym + origTotal.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2})
        : origTotal.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' ' + a.devise;
      deviseHtml = `<div class="art-devise">${origStr} → ${fmt(a.montant)} (taux ${a.taux}). Valeur estimée en EUR.</div>`;
    }
    const livr = a.statut_livr === 'Reçu';
    const livrHtml = a.type_article === 'Service'
      ? ''
      : `<span class="art-livr ${livr?'recu':'attente'}">${livr?'✓ Livré':'⏳ En attente'}</span>`;
    return `
    <div class="art ${a.type_article==='Service'?'svc':''}">
      <div class="art-main">
        <span class="art-name">${a.qte>1?a.qte+'× ':''}${a.designation||'(sans nom)'}${a.ref && a.type_article!=='Service'?` <span class="art-ref">(Réf. ${a.ref})</span>`:''}</span>
        <span class="art-right">${livrHtml}<span class="art-price">${fmt(a.montant)}</span></span>
      </div>
      ${deviseHtml}
      ${demHtml}
    </div>`;
  }).join('') : '<div class="empty">Aucun article.</div>';

  const footLabel = nbServ ? `${nbProd} article(s) + ${nbServ} service(s)` : `${nbProd} article(s)`;

  // Divisa de la DA (si tots els articles són en la mateixa devise non-EUR)
  const devises = [...new Set(arts.map(a => a.devise || 'EUR'))];
  const daDevise = devises.length === 1 ? devises[0] : 'EUR';
  let totalDeviseHtml = '';
  if (daDevise !== 'EUR' && arts.length) {
    const origTotal = arts.reduce((s,a) => s + (a.prix||0)*(a.qte||1), 0);
    const symbols = { USD: '$', GBP: '£', CHF: 'CHF ', JPY: '¥' };
    const sym = symbols[daDevise] || (daDevise + ' ');
    const origStr = (daDevise === 'USD' || daDevise === 'GBP')
      ? sym + origTotal.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2})
      : origTotal.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' ' + daDevise;
    totalDeviseHtml = `<div class="total-devise">${origStr} → ${fmt(total)}. Valeur estimée en EUR.</div>`;
  }

  // Acció: passar a Envoyée PGM (només si està En cours i té articles)
  const today = new Date().toISOString().slice(0,10);
  let actionHtml = '';
  if (d.statut === 'En cours' && arts.length > 0) {
    actionHtml = `
      <div class="detail-action">
        <div class="detail-action-title">Envoyer à PGM</div>
        <div class="detail-action-row">
          <input type="date" id="pgm-date" value="${today}">
          <button class="btn-pgm" onclick="envoyerPGM(${d.id})">Passer à « Envoyée PGM »</button>
        </div>
        <div class="msg" id="pgm-msg"></div>
      </div>`;
  }

  // Secció de fitxers adjunts
  const fichiers = [
    { label: 'PJ', field: 'PJ', ids: attachIds(d.pj) },
    { label: 'BC', field: 'BC', ids: attachIds(d.bc) },
    { label: 'DA', field: 'DA', ids: attachIds(d.da) },
    { label: 'Autres', field: 'Autres', ids: attachIds(d.autres) },
  ];
  const filesHtml = fichiers.map(f => {
    const has = f.ids.length > 0;
    const links = has
      ? f.ids.map((aid,idx) => `<a class="file-link" href="#" onclick="openAttachment(${aid}); return false;">${f.label}${f.ids.length>1?' '+(idx+1):''}</a>`).join('')
      : `<span class="file-empty">${f.label}</span>`;
    return `<div class="file-cat ${has?'has':''}">${links}</div>`;
  }).join('');

  return `
    <div class="detail">
      <div class="detail-head">
        <div class="detail-head-top">
          <span class="detail-num">${d.num_da}</span>
          <div style="display:flex; align-items:center; gap:8px;">
            <span class="badge ${badgeClass(d.statut)}">${d.statut}</span>
            <button class="btn-delete" onclick="toggleDelete(${d.id})">✕ Annuler la DA</button>
          </div>
        </div>
        <div class="detail-route">${d.contrat || '—'} → ${d.fournisseur || '—'}${d.num_bc ? ' · BC ' + d.num_bc : ''}</div>
        <div class="detail-dates">Créée le ${fmtDate(d.date_da)}${d.date_pgm ? ' · Envoyée PGM le ' + fmtDate(d.date_pgm) : ''}</div>
      </div>
      <div class="detail-arts">${artsHtml}</div>
      <div class="detail-foot">
        <span style="color:#888">${footLabel}</span>
        <span class="detail-total">${fmt(total)}</span>
      </div>
      ${totalDeviseHtml}
      <div class="detail-files">
        <div class="detail-files-title">Documents</div>
        <div class="detail-files-row">${filesHtml}</div>
      </div>
      ${actionHtml}
      <div class="delete-confirm" id="del-confirm-${d.id}">
        <div class="delete-confirm-title">⚠ Annuler cette DA ? (le numéro sera libéré)</div>
        <div class="delete-confirm-row">
          <button class="btn-del-only" onclick="deleteDA(${d.id}, false)">Annuler (articles → libres)</button>
          <button class="btn-del-all" onclick="deleteDA(${d.id}, true)">Annuler DA + articles</button>
          <button class="btn-del-cancel" onclick="toggleDelete(${d.id})">Retour</button>
        </div>
      </div>
    </div>`;
}

function toggleDelete(id) {
  const panel = document.getElementById('del-confirm-' + id);
  if (panel) panel.classList.toggle('open');
}

async function deleteDA(id, withArticles) {
  try {
    const da = das.find(x => x.id === id);
    const arts = commandes.filter(c => c.demande_achat === id);
    const actions = [];

    if (withArticles) {
      // Articles restent rattachés mais marqués via la DA annulée (on les laisse)
      // -> on garde le lien pour traçabilité
    } else {
      // Désassigner les articles (ils repassent en libres)
      if (arts.length) {
        actions.push(['BulkUpdateRecord', 'Commandes', arts.map(a => a.id), {
          Demande_achat: arts.map(() => null)
        }]);
      }
    }

    // Marquer la DA comme annulée + libérer le numéro (suffixe -ANN)
    const numOrig = da ? String(da.num_da) : '';
    const numAnn = numOrig.endsWith('-ANN') ? numOrig : numOrig + '-ANN';
    actions.push(['UpdateRecord', 'Demandes_achat', id, {
      Statut: 'Annulée',
      Num_DA: numAnn,
    }]);

    await grist.docApi.applyUserActions(actions);
    selectedDA = null;
    await fetchAll();
  } catch(e) {
    alert('Erreur lors de l\'annulation : ' + e.message);
  }
}

async function openAttachment(attId) {
  try {
    const tokenInfo = await grist.docApi.getAccessToken({ readOnly: true });
    const url = `${tokenInfo.baseUrl}/attachments/${attId}/download?auth=${tokenInfo.token}&inline=true`;
    window.open(url, '_blank');
  } catch(e) {
    alert('Impossible d\'ouvrir le fichier : ' + e.message);
  }
}



async function envoyerPGM(id) {
  const dateVal = document.getElementById('pgm-date').value;
  const msg = document.getElementById('pgm-msg');
  let datePgm = null;
  if (dateVal) datePgm = Math.floor(new Date(dateVal+'T00:00:00Z').getTime()/1000);

  try {
    await grist.docApi.applyUserActions([
      ['UpdateRecord', 'Demandes_achat', id, {
        Statut: 'Envoyée PGM',
        Date_OrderPGM: datePgm,
      }]
    ]);
    await fetchAll();
    // Re-render del detall amb el nou estat
    selectDA(id);
  } catch(e) {
    if (msg) { msg.className = 'msg err'; msg.textContent = 'Erreur : ' + e.message; }
  }
}

function demandeursOfDA(daId) {
  const set = new Set();
  artsOf(daId).forEach(a => choixList(a.demandeur).forEach(x => set.add(x)));
  return set;
}

function setFilterFour(v) {
  filterFour = v;
}
function onSearchBC(v) {
  searchBC = v;
  if (v.trim() && tab === 'libres') { tab = 'toutes'; }
  // Re-renderitzar mantenint el focus a l'input
  renderFrame(renderListContent());
  const inp = document.getElementById('bc-search-input');
  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  selectedDA = null;
  render();
}

function setFilterDem(v) {
  filterDem = v;
  selectedDA = null;
  render();
}

function selectDA(id) {
  selectedDA = id;
  // Actualitzar selecció visual de la llista
  document.querySelectorAll('.da-item').forEach(el => el.classList.remove('sel'));
  const item = document.querySelector('.da-item[data-da="' + id + '"]');
  if (item) item.classList.add('sel');
  // Actualitzar el panell de detall directament (segona columna de inner-layout)
  const d = das.find(x => x.id === id);
  const inner = document.querySelector('.inner-layout');
  if (inner && inner.children[1]) {
    inner.children[1].innerHTML = '<div class="panel-title">Détail</div>' + renderDetail(d);
  }
}

function renderLibresContent() {
  const libres = commandes.filter(c => !c.demande_achat);
  // DA en cours per assignar
  const dasEnCours = das.filter(d => d.statut === 'En cours')
    .sort((a,b) => String(b.num_da).localeCompare(String(a.num_da), undefined, {numeric:true}));

  let artsHtml = libres.length ? libres.map(a => {
    const checked = selectedArts.has(a.id);
    return `
      <div class="assign-art ${checked?'checked':''}" onclick="toggleArt(${a.id})">
        <div class="assign-check">✓</div>
        <div class="assign-art-info">
          <div class="assign-art-name">${a.qte>1?a.qte+'× ':''}${a.designation||'(sans nom)'}</div>
          <div class="assign-art-meta">${a.ref?'Réf: '+a.ref+' · ':''}${fmt(a.montant)}</div>
        </div>
      </div>`;
  }).join('') : '<div class="empty">Aucun article libre.</div>';

  let options = '<option value="">— Choisir une DA —</option>';
  dasEnCours.forEach(d => {
    options += `<option value="${d.id}">${d.num_da} — ${d.contrat || ''} → ${d.fournisseur || ''}</option>`;
  });

  return `
    <div style="max-width:560px;">
      <div class="panel-title">Assigner les articles libres à une DA en cours</div>
      <select class="assign-da-select" id="assign-da" onchange="onAssignDAChange()">${options}</select>
      <div class="assign-toolbar">
        <button onclick="selectAllLibres()">Tout sélectionner</button>
        <button onclick="deselectAllLibres()">Tout désélectionner</button>
        <span style="flex:1"></span>
        <span style="font-size:11px; color:#888; align-self:center;">${selectedArts.size} sélectionné(s)</span>
      </div>
      ${artsHtml}
      <button class="btn-assign" id="btn-assign" ${selectedArts.size===0 ? 'disabled' : ''} onclick="assignArticles()">Assigner</button>
      <div class="msg" id="msg"></div>
    </div>`;
}

function toggleArt(id) {
  if (selectedArts.has(id)) selectedArts.delete(id);
  else selectedArts.add(id);
  render();
}
function selectAllLibres() {
  commandes.filter(c => !c.demande_achat).forEach(c => selectedArts.add(c.id));
  render();
}
function deselectAllLibres() {
  selectedArts.clear();
  render();
}
function onAssignDAChange() {
  const btn = document.getElementById('btn-assign');
  if (btn) btn.disabled = selectedArts.size === 0 || !document.getElementById('assign-da').value;
}

async function assignArticles() {
  const daId = document.getElementById('assign-da').value;
  if (!daId || selectedArts.size === 0) return;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn-assign');
  btn.disabled = true;

  try {
    const ids = [...selectedArts];
    await grist.docApi.applyUserActions([
      ['BulkUpdateRecord', 'Commandes', ids, { Demande_achat: ids.map(()=>Number(daId)) }]
    ]);
    const da = das.find(x => x.id == daId);
    msg.className = 'msg ok';
    msg.textContent = `${ids.length} article(s) assigné(s) à ${da ? da.num_da : ''}`;
    selectedArts.clear();
    await fetchAll();
    setTimeout(() => { if(document.getElementById('msg')){} }, 100);
  } catch(e) {
    msg.className = 'msg err';
    msg.textContent = 'Erreur : ' + e.message;
    btn.disabled = false;
  }
}


function openNewDA() {
  tab = 'nouvelle';
  selectedDA = null;
  render();
}

function nextNumDA() {
  // Buscar el número més alt existent i sumar 1 (ignorant les DA annulées)
  let maxN = 0;
  das.forEach(d => {
    if (d.statut === 'Annulée' || String(d.num_da).endsWith('-ANN')) return;
    const m = String(d.num_da).match(/(\d+)/);
    if (m) { const n = parseInt(m[1], 10); if (n > maxN) maxN = n; }
  });
  const next = maxN + 1;
  return 'DA-' + String(next).padStart(3, '0');
}

function renderNewDAContent() {
  const contratsOpts = '<option value="">— Choisir —</option>' +
    contratsList.slice().sort((a,b)=>a.nom.localeCompare(b.nom,'fr',{sensitivity:'base'}))
      .map(c => `<option value="${c.id}">${c.nom}</option>`).join('');
  const fourOpts = '<option value="">— Choisir —</option>' +
    fournisseursList.slice().sort((a,b)=>a.nom.localeCompare(b.nom,'fr',{sensitivity:'base'}))
      .map(f => `<option value="${f.id}">${f.nom}</option>`).join('');
  const today = new Date().toISOString().slice(0,10);

  return `
    <div style="max-width:380px;">
      <div class="panel-title">Nouvelle demande d'achat</div>
      <div style="border:1px solid #e5e5e5; border-radius:11px; padding:16px;">
        <div style="margin-bottom:12px;">
          <label style="font-size:11px; color:#999; text-transform:uppercase; letter-spacing:.03em; display:block; margin-bottom:4px;">N° DA</label>
          <input type="text" class="assign-da-select" id="new-num" style="margin-bottom:0;" value="${nextNumDA()}">
        </div>
        <div style="margin-bottom:12px;">
          <label style="font-size:11px; color:#999; text-transform:uppercase; letter-spacing:.03em; display:block; margin-bottom:4px;">Contrat</label>
          <select class="assign-da-select" id="new-contrat" style="margin-bottom:0;" onchange="onNewContratChange()">${contratsOpts}</select>
        </div>
        <div style="margin-bottom:12px;">
          <label style="font-size:11px; color:#999; text-transform:uppercase; letter-spacing:.03em; display:block; margin-bottom:4px;">Ligne budgétaire</label>
          <select class="assign-da-select" id="new-ligne" style="margin-bottom:0;" disabled><option value="">— Choisir d'abord un contrat —</option></select>
        </div>
        <div style="margin-bottom:12px;">
          <label style="font-size:11px; color:#999; text-transform:uppercase; letter-spacing:.03em; display:block; margin-bottom:4px;">Fournisseur</label>
          <select class="assign-da-select" id="new-four" style="margin-bottom:0;">${fourOpts}</select>
        </div>
        <div style="margin-bottom:16px;">
          <label style="font-size:11px; color:#999; text-transform:uppercase; letter-spacing:.03em; display:block; margin-bottom:4px;">Date DA</label>
          <input type="date" class="assign-da-select" id="new-date" style="margin-bottom:0;" value="${today}">
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn-assign" style="margin-top:0;" onclick="createDA()">Créer la DA</button>
          <button class="tab" onclick="setTab('toutes')">Annuler</button>
        </div>
        <div class="msg" id="new-msg"></div>
      </div>
    </div>`;
}

function onNewContratChange() {
  const contratId = document.getElementById('new-contrat').value;
  const sel = document.getElementById('new-ligne');
  if (!contratId) {
    sel.innerHTML = '<option value="">— Choisir d\'abord un contrat —</option>';
    sel.disabled = true;
    return;
  }
  // Filtrar línies del contracte seleccionat
  const lignesContrat = lignesList.filter(l => {
    const c = l.contrat;
    const cid = typeof c === 'number' ? c : (Array.isArray(c) ? c[1] : null);
    return cid == contratId;
  });
  sel.disabled = false;
  sel.innerHTML = '<option value="">— Choisir —</option>' +
    lignesContrat.map(l => {
      const parts = l.label.split('|');
      const sub = parts.length > 1 ? parts.slice(1).join('|').trim() : l.label;
      return `<option value="${l.id}">${sub}</option>`;
    }).join('');
}

async function createDA() {
  const numDA = document.getElementById('new-num').value.trim();
  const contratId = document.getElementById('new-contrat').value;
  const ligneId = document.getElementById('new-ligne').value;
  const fourId = document.getElementById('new-four').value;
  const dateVal = document.getElementById('new-date').value;
  const msg = document.getElementById('new-msg');

  if (!numDA || !contratId || !ligneId || !fourId) {
    msg.className = 'msg err';
    msg.textContent = 'N° DA, contrat, ligne et fournisseur sont obligatoires.';
    return;
  }

  let dateDA = null;
  if (dateVal) dateDA = Math.floor(new Date(dateVal+'T00:00:00Z').getTime()/1000);

  try {
    await grist.docApi.applyUserActions([
      ['AddRecord', 'Demandes_achat', null, {
        Num_DA: numDA,
        Contrat: Number(contratId),
        Ligne_budgetaire: Number(ligneId),
        Fournisseur: Number(fourId),
        Date_DA: dateDA,
        Statut: 'En cours',
      }]
    ]);
    msg.className = 'msg ok';
    msg.textContent = 'DA créée avec succès !';
    await fetchAll();
    setTimeout(() => setTab('En cours'), 800);
  } catch(e) {
    msg.className = 'msg err';
    msg.textContent = 'Erreur : ' + e.message;
  }
}

function loadData() {
  if (window.grist) {
    grist.ready({ requiredAccess: 'full' });
    fetchAll();
    grist.onRecords(() => { if (tab !== 'nouvelle') fetchAll(); });
    window.addEventListener('focus', () => { if (tab !== 'nouvelle') fetchAll(); });
  } else {
    document.getElementById('container').innerHTML = '<div class="empty">Connectez à Grist.</div>';
  }
}
const s = document.createElement('script');
s.src='https://docs.getgrist.com/grist-plugin-api.js';
s.onload=loadData; s.onerror=loadData;
document.head.appendChild(s);
</script>
</body>
</html>
