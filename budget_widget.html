<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget IRCM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 16px; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #e8e8e8; } }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.title { font-size: 15px; font-weight: 500; }
select { font-size: 13px; padding: 4px 8px; border: 0.5px solid #ccc; border-radius: 6px; background: inherit; color: inherit; cursor: pointer; }
.cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.card { background: #f5f5f3; border-radius: 8px; padding: 12px; }
@media (prefers-color-scheme: dark) { .card { background: #2a2a2a; } }
.card-label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
.card-value { font-size: 20px; font-weight: 500; }
.chart-wrap { position: relative; width: 100%; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; color: #666; }
.legend span { display: flex; align-items: center; gap: 5px; }
.leg-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <div class="title">Suivi budgétaire</div>
  <select id="contrat-select"><option value="">Tous les contrats</option></select>
</div>
<div class="cards">
  <div class="card"><div class="card-label">Budget total</div><div class="card-value" id="total-budget">—</div></div>
  <div class="card"><div class="card-label">Engagé</div><div class="card-value" id="total-engage">—</div></div>
  <div class="card"><div class="card-label">Disponible</div><div class="card-value" id="total-dispo">—</div></div>
</div>
<div class="legend">
  <span><span class="leg-sq" style="background:#378ADD"></span>Budget ajusté</span>
  <span><span class="leg-sq" style="background:#1D9E75"></span>Disponible</span>
  <span><span class="leg-sq" style="background:#E24B4A"></span>Dépassement</span>
</div>
<div class="chart-wrap" id="chart-wrap">
  <div class="loading" id="loading">Chargement…</div>
  <canvas id="myChart" role="img" aria-label="Graphique de suivi budgétaire par ligne"></canvas>
</div>

<script>
let allData = [];
let chart = null;

function fmt(v) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(v);
}

function renderChart(data) {
  const sel = document.getElementById('contrat-select').value;
  const labels = data.map(d => {
    if (sel) {
      const parts = d.label.split('|');
      const sub = parts.length > 1 ? parts[1].trim() : d.label;
      return sub.length > 25 ? sub.substring(0, 23) + '…' : sub;
    } else {
      return d.label.length > 35 ? d.label.substring(0, 33) + '…' : d.label;
    }
  });
  const budgets = data.map(d => d.budget_ajuste);
  const dispos = data.map(d => Math.max(0, d.disponible));
  const depasse = data.map(d => d.disponible < 0 ? Math.abs(d.disponible) : 0);

  const bgBudget = data.map(() => '#378ADD33');
  const bgDispo = data.map(d => d.disponible < 0 ? '#E24B4A' : '#1D9E75');

  const h = Math.max(300, data.length * 48 + 80);
  document.getElementById('chart-wrap').style.height = h + 'px';

  if (chart) chart.destroy();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('myChart').style.display = 'block';

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const textColor = isDark ? '#ccc' : '#444';
  const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';

  chart = new Chart(document.getElementById('myChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Budget ajusté',
          data: budgets,
          backgroundColor: '#378ADD55',
          borderColor: '#378ADD',
          borderWidth: 1,
          borderRadius: 3,
        },
        {
          label: 'Disponible',
          data: data.map(d => d.disponible),
          backgroundColor: bgDispo,
          borderColor: bgDispo,
          borderWidth: 0,
          borderRadius: 3,
        }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const d = data[ctx.dataIndex];
              if (ctx.datasetIndex === 0) return ' Budget ajusté: ' + fmt(d.budget_ajuste);
              return ' Disponible: ' + fmt(d.disponible) + (d.disponible < 0 ? ' ⚠' : '');
            },
            afterBody: (items) => {
              const d = data[items[0].dataIndex];
              return ['Commandes: ' + fmt(d.total_commandes)];
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: textColor, font: { size: 11 }, callback: v => fmt(v) },
          grid: { color: gridColor },
        },
        y: {
          ticks: { color: textColor, font: { size: 11 }, autoSkip: false },
          grid: { display: false },
        }
      }
    }
  });
}

function updateView() {
  const sel = document.getElementById('contrat-select').value;
  const filtered = sel ? allData.filter(d => d.contrat === sel) : allData;

  const totalBudget = filtered.reduce((s, d) => s + d.budget_ajuste, 0);
  const totalEngage = filtered.reduce((s, d) => s + d.total_commandes, 0);
  const totalDispo  = filtered.reduce((s, d) => s + d.disponible, 0);

  document.getElementById('total-budget').textContent = fmt(totalBudget);
  document.getElementById('total-engage').textContent = fmt(totalEngage);
  document.getElementById('total-dispo').style.color = totalDispo < 0 ? '#E24B4A' : '#1D9E75';
  document.getElementById('total-dispo').textContent = fmt(totalDispo);

  renderChart(filtered);
}

async function loadData() {
  try {
    const gristReady = new Promise(resolve => {
      if (window.grist) resolve();
      else document.addEventListener('grist-ready', resolve);
    });

    if (window.grist) {
      grist.ready({ requiredAccess: 'read table' });
      grist.onRecords((records) => {
        allData = records.map(r => ({
          label:           r.Label || r.label || '',
          contrat:         r.Contrat || '',
          budget_ajuste:   r.Budget_ajuste || 0,
          total_commandes: r.Total_commandes || 0,
          disponible:      r.Disponible || 0,
          alerte:          r.Alerte || '',
        })).filter(d => d.label);

        // Populate contrat filter
        const contrats = [...new Set(allData.map(d => d.contrat))].filter(Boolean).sort();
        const sel = document.getElementById('contrat-select');
        sel.innerHTML = '<option value="">Tous les contrats</option>';
        contrats.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c;
          sel.appendChild(opt);
        });

        updateView();
      });
    } else {
      // Mode démo sans Grist
      document.getElementById('loading').textContent = 'Connectez ce widget à la table Lignes_budgetaires dans le panneau latéral.';
    }
  } catch(e) {
    document.getElementById('loading').textContent = 'Erreur: ' + e.message;
  }
}

document.getElementById('contrat-select').addEventListener('change', updateView);
document.getElementById('myChart').style.display = 'none';

const gristScript = document.createElement('script');
gristScript.src = 'https://docs.getgrist.com/grist-plugin-api.js';
gristScript.onload = loadData;
gristScript.onerror = loadData;
document.head.appendChild(gristScript);
</script>
</body>
</html>
