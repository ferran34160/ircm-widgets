<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartes Budget IRCM</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 16px; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #e8e8e8; } }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.title { font-size: 15px; font-weight: 500; }
select { font-size: 13px; padding: 5px 10px; border: 1px solid #ccc; border-radius: 6px; background: inherit; color: inherit; cursor: pointer; }
.summary { display: flex; gap: 20px; margin-bottom: 18px; flex-wrap: wrap; }
.sum-item { font-size: 13px; }
.sum-item b { font-size: 16px; font-weight: 500; display: block; }
.cat-section { margin-bottom: 22px; }
.cat-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; padding-bottom: 5px; border-bottom: 2px solid; }
.cat-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.cat-total { margin-left: auto; font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; text-transform: none; letter-spacing: 0; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; }
.bcard { border-radius: 12px; padding: 14px 16px; border: 1px solid; border-left-width: 4px; }
.bcard-cat { font-size: 12px; margin: 0 0 2px; opacity: 0.75; }
.bcard-sub { font-size: 13px; font-weight: 500; margin: 0 0 12px; line-height: 1.3; display: flex; align-items: center; gap: 6px; }
.bcard-dispo { font-size: 26px; font-weight: 500; margin: 0; }
.bcard-dispo.neg { color: #A32D2D; }
@media (prefers-color-scheme: dark) { .bcard-dispo.neg { color: #F09595; } }
.bcard-meta { font-size: 11px; margin: 4px 0 0; opacity: 0.7; }
.bcard-releve { font-size: 11px; margin: 8px 0 0; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.1); opacity: 0.8; }
.bcard-reste { font-size: 11px; margin: 4px 0 0; opacity: 0.8; font-style: italic; }
@media (prefers-color-scheme: dark) { .bcard-releve { border-top-color: rgba(255,255,255,0.15); } }
.pct-track { height: 5px; background: rgba(0,0,0,0.1); border-radius: 3px; margin-top: 10px; overflow: hidden; }
@media (prefers-color-scheme: dark) { .pct-track { background: rgba(255,255,255,0.15); } }
.pct-fill { height: 100%; border-radius: 3px; }
.bcard-pct { font-size: 11px; margin-top: 6px; opacity: 0.75; }
.alert-icon { color: #E24B4A; font-size: 14px; }
.loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <div class="title">Disponible par ligne budgétaire</div>
  <select id="contrat-select"><option value="">Tous les contrats</option></select>
</div>
<div class="summary" id="summary"></div>
<div id="cards-container">
  <div class="loading" id="loading">Chargement…</div>
</div>

<script>
let allData = [];

const CAT_COLORS = {
  'Fonctionnement': { c: '#378ADD', bg: '#EAF3FB', dark: '#16314A', txt: '#0C447C', dtxt: '#9FC6EE' },
  'Équipement':     { c: '#D97B3F', bg: '#FBF0E8', dark: '#3D2A1A', txt: '#8A4A18', dtxt: '#E0A87C' },
  'Personnel':      { c: '#9C6ADE', bg: '#F0EAFB', dark: '#2A1F3D', txt: '#5E3A9E', dtxt: '#C4A6EC' },
  'Prestation':     { c: '#1D9E75', bg: '#EAFBF3', dark: '#16402F', txt: '#0F6E56', dtxt: '#9FE1CB' },
  'Mission':        { c: '#BA9517', bg: '#FBF8E8', dark: '#3D3A1A', txt: '#6B5A0B', dtxt: '#E0CC7C' },
};
const CAT_ORDER = ['Fonctionnement', 'Équipement', 'Personnel', 'Prestation', 'Mission'];

function getCat(label) {
  for (const key of CAT_ORDER) {
    if (label.includes(key)) return key;
  }
  return 'Autre';
}
function catStyle(cat) {
  return CAT_COLORS[cat] || { c: '#999', bg: '#F5F5F3', dark: '#2A2A2A', txt: '#555', dtxt: '#aaa' };
}

function fmt(v) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v);
}
function fmtDate(g) {
  if (!g) return null;
  let ms; if (g > 1e15) ms = g/1000; else if (g > 1e11) ms = g; else ms = g*1000;
  const d = new Date(ms);
  if (isNaN(d.getTime()) || d.getFullYear() > 3000) return null;
  return d.toLocaleDateString('fr-FR');
}
function getState(d) {
  if (d.disponible < 0) return 'danger';
  if (d.budget_ajuste > 0 && d.disponible / d.budget_ajuste < 0.1) return 'warn';
  return 'ok';
}

function render(data) {
  const container = document.getElementById('cards-container');
  if (data.length === 0) {
    container.innerHTML = '<div class="loading">Aucune ligne budgétaire.</div>';
    return;
  }

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;

  // Agrupar per categoria
  const groups = {};
  data.forEach(d => {
    const cat = getCat(d.label);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(d);
  });

  const cats = CAT_ORDER.filter(c => groups[c]).concat(Object.keys(groups).filter(c => !CAT_ORDER.includes(c)));

  let html = '';
  cats.forEach(cat => {
    const st = catStyle(cat);
    const catDispo = groups[cat].reduce((s, d) => s + d.disponible, 0);
    html += `<div class="cat-section">
      <div class="cat-title" style="border-bottom-color:${st.c}; color:${isDark ? st.dtxt : st.txt};">
        <span class="cat-dot" style="background:${st.c}"></span>${cat}
        <span class="cat-total" style="color:${catDispo < 0 ? '#E24B4A' : (isDark ? st.dtxt : st.txt)}">${fmt(catDispo)}</span>
      </div>
      <div class="cards-grid">`;

    groups[cat].forEach(d => {
      const aReleve = d.montant_releve != null;
      const base = aReleve ? d.montant_releve : 0;

      // Estat segons disponible respecte al relevé
      let state = 'ok';
      if (d.disponible < 0) state = 'danger';
      else if (aReleve && base > 0 && d.disponible / base < 0.1) state = 'warn';

      const pct = (aReleve && base > 0) ? Math.max(0, Math.min(100, Math.round(d.disponible / base * 100))) : 0;
      const barColor = state === 'ok' ? '#1D9E75' : state === 'warn' ? '#BA7517' : '#E24B4A';
      const fillPct = state === 'danger' ? 100 : pct;
      const pctText = state === 'danger' ? 'Dépassement' : pct + '% du dernier relevé';

      const parts = d.label.split('|');
      const contrat = parts[0] ? parts[0].trim() : '';
      const sub = parts.length > 1 ? parts.slice(1).join('|').trim() : d.label;

      const alertIcon = state !== 'ok' ? '<span class="alert-icon">⚠</span>' : '';

      const cardBg = isDark ? st.dark : st.bg;
      const txtColor = isDark ? st.dtxt : st.txt;

      const releveDate = fmtDate(d.date_releve);

      // Bloc central: amb relevé o sense
      let infoHtml, barHtml;
      if (aReleve) {
        infoHtml = `<p class="bcard-meta" style="color:${txtColor}">sur ${fmt(d.montant_releve)} au dernier relevé du ${releveDate} · engagé ${fmt(d.commandes_post)}</p>`;
        barHtml = `<div class="pct-track"><div class="pct-fill" style="background:${barColor}; width:${fillPct}%"></div></div>
          <p class="bcard-pct" style="color:${txtColor}">${pctText}</p>`;
      } else {
        infoHtml = `<p class="bcard-meta" style="color:${txtColor}; font-style:italic;">Pas encore de relevé</p>`;
        barHtml = '';
      }

      const resteHtml = (d.reste_notifier > 0)
        ? `<p class="bcard-reste">Reste à notifier : ${fmt(d.reste_notifier)}</p>`
        : '';

      html += `
        <div class="bcard" style="background:${cardBg}; border-color:${st.c}33; border-left-color:${st.c};">
          <p class="bcard-cat" style="color:${txtColor}">${contrat}</p>
          <p class="bcard-sub" style="color:${txtColor}">${sub} ${alertIcon}</p>
          <p class="bcard-dispo ${state === 'danger' ? 'neg' : ''}" style="${state !== 'danger' ? 'color:'+txtColor : ''}">${fmt(d.disponible)}</p>
          ${infoHtml}
          ${barHtml}
          ${resteHtml}
        </div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function updateView() {
  const sel = document.getElementById('contrat-select').value;
  const filtered = sel ? allData.filter(d => d.contrat === sel) : allData;

  const totalEngage = filtered.reduce((s, d) => s + d.commandes_post, 0);
  const totalDispo  = filtered.reduce((s, d) => s + d.disponible, 0);

  document.getElementById('summary').innerHTML = `
    <div class="sum-item">Engagé depuis le dernier relevé<b>${fmt(totalEngage)}</b></div>
    <div class="sum-item">Disponible total<b style="color:${totalDispo < 0 ? '#E24B4A' : '#1D9E75'}">${fmt(totalDispo)}</b></div>
  `;

  render(filtered);
}

function loadData() {
  if (window.grist) {
    grist.ready({ requiredAccess: 'read table' });
    grist.onRecords((records) => {
      allData = records.map(r => ({
        label:           r.Label || r.label || '',
        contrat:         r.Contrat || '',
        budget_ajuste:   r.Budget_ajuste || 0,
        total_commandes: r.Total_commandes || 0,
        disponible:      r.Disponible || 0,
        montant_releve:  r.Montant_dernier_releve,
        date_releve:     r.Date_dernier_releve,
        commandes_post:  r.Commandes_post_releve || 0,
        reste_notifier:  r.Reste_a_notifier || 0,
      })).filter(d => d.label);

      const contrats = [...new Set(allData.map(d => d.contrat))].filter(Boolean).sort();
      const sel = document.getElementById('contrat-select');
      sel.innerHTML = '<option value="">Tous les contrats</option>';
      contrats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });

      updateView();
    });
  } else {
    document.getElementById('loading').textContent = 'Connectez ce widget à la table Lignes_budgetaires.';
  }
}

document.getElementById('contrat-select').addEventListener('change', updateView);

const gristScript = document.createElement('script');
gristScript.src = 'https://docs.getgrist.com/grist-plugin-api.js';
gristScript.onload = loadData;
gristScript.onerror = loadData;
document.head.appendChild(gristScript);
</script>
</body>
</html>
