<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Évolution du disponible</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 16px; font-size: 13px; }
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #e8e8e8; } }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
.title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.title-dot { width: 9px; height: 9px; border-radius: 50%; background: #378ADD; }
select { font-size: 13px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 7px; background: inherit; color: inherit; cursor: pointer; max-width: 280px; }
@media (prefers-color-scheme: dark) { select { border-color: #444; } }
.legend { display: flex; gap: 14px; flex-wrap: wrap; margin: 10px 0 4px; font-size: 11px; }
.leg-item { display: flex; align-items: center; gap: 5px; color: #777; }
@media (prefers-color-scheme: dark) { .leg-item { color: #aaa; } }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; }
.leg-dot.cmd { background: #E24B4A; }
.leg-dot.sortie { background: #D9803F; }
.leg-dot.entree { background: #1D9E75; }
.leg-dot.transf { background: #9C6ADE; }
.leg-dot.releve { background: #378ADD; border-radius: 2px; }
.chart-wrap { position: relative; margin-top: 8px; max-width: 1400px; overflow: visible; }
svg { width: 100%; height: auto; display: block; }
.grid-line { stroke: rgba(0,0,0,0.07); stroke-width: 1; }
@media (prefers-color-scheme: dark) { .grid-line { stroke: rgba(255,255,255,0.1); } }
.axis-label { font-size: 10px; fill: #999; }
.dispo-line { fill: none; stroke: #378ADD; stroke-width: 2; }
.dispo-area { fill: url(#grad); opacity: 0.12; }
.pt { cursor: pointer; transition: r .1s; }
.pt:hover { r: 7; }
.zero-line { stroke: #E24B4A; stroke-width: 1; stroke-dasharray: 4 3; opacity: 0.6; }
.tooltip { position: absolute; pointer-events: none; background: #222; color: #fff; padding: 8px 11px; border-radius: 8px; font-size: 12px; opacity: 0; transition: opacity .12s; white-space: nowrap; z-index: 10; box-shadow: 0 3px 12px rgba(0,0,0,0.25); }
.tooltip.show { opacity: 1; }
.tooltip b { font-weight: 600; }
.tooltip .tt-date { color: #bbb; font-size: 10px; }
.tooltip .tt-svc { background: #F0EAFB; color: #5E3A9E; font-size: 9px; padding: 1px 5px; border-radius: 5px; font-weight: 600; }
.dp-svc { background: #F0EAFB; color: #5E3A9E; font-size: 10px; padding: 1px 6px; border-radius: 5px; font-weight: 600; margin-left: 4px; }
@media (prefers-color-scheme: dark) { .tooltip .tt-svc, .dp-svc { background: #2A1F3D; color: #C4A6EC; } }
.tooltip .tt-amount { font-variant-numeric: tabular-nums; }
.empty { text-align: center; padding: 40px; color: #aaa; }
.detail-panel { max-width: 760px; margin-top: 16px; border: 1px solid #e5e5e5; border-radius: 12px; padding: 14px 16px; background: #fafaf8; display: none; }
.detail-panel.show { display: block; }
@media (prefers-color-scheme: dark) { .detail-panel { background: #202020; border-color: #353535; } }
.dp-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.dp-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.dp-badge { width: 10px; height: 10px; border-radius: 50%; }
.dp-date { font-size: 11px; color: #999; }
.dp-four { font-size: 12px; font-weight: 400; color: #888; margin-left: 4px; }
@media (prefers-color-scheme: dark) { .dp-four { color: #aaa; } }
.dp-close { background: none; border: none; font-size: 18px; color: #aaa; cursor: pointer; line-height: 1; }
.dp-close:hover { color: #E24B4A; }
.dp-row { display: flex; justify-content: space-between; gap: 12px; padding: 5px 0; font-size: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); }
.dp-row:last-child { border-bottom: none; }
@media (prefers-color-scheme: dark) { .dp-row { border-bottom-color: rgba(255,255,255,0.07); } }
.dp-row .lbl { color: #666; flex: 1; min-width: 0; }
.dp-row .val { font-variant-numeric: tabular-nums; font-weight: 500; white-space: nowrap; }
@media (prefers-color-scheme: dark) { .dp-row .lbl { color: #aaa; } }
.dp-total { margin-top: 8px; padding-top: 8px; border-top: 1.5px solid rgba(0,0,0,0.12); display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; }
@media (prefers-color-scheme: dark) { .dp-total { border-top-color: rgba(255,255,255,0.15); } }
.dp-info { font-size: 12px; color: #555; line-height: 1.6; }
@media (prefers-color-scheme: dark) { .dp-info { color: #bbb; } }
.dp-info b { font-weight: 600; color: inherit; }
.loading { text-align: center; padding: 40px; color: #888; }
.summary { display: flex; gap: 20px; margin: 12px 0 0; flex-wrap: wrap; font-size: 12px; }
.sum b { display: block; font-size: 16px; font-weight: 600; }
</style>
</head>
<body>
<div class="header">
  <div class="title"><span class="title-dot"></span>Évolution du disponible</div>
  <select id="contrat-select"><option value="">— Contrat —</option></select>
  <select id="ligne-select"><option value="">— Ligne budgétaire —</option></select>
</div>
<div id="container"><div class="loading">Chargement…</div></div>
<div class="detail-panel" id="detail-panel"></div>
<div class="tooltip" id="tooltip"></div>

<script>
let lignes=[], commandes=[], transferts=[], mouvements=[], releves=[], das={}, contratNoms={}, fourNoms={}, contratsMasques=new Set();
let selContrat='', selLigne='';

function fmt(v){ return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(v); }
function toMs(g){ if(!g)return 0; if(g>1e15)return g/1000; if(g>1e11)return g; return g*1000; }
function fmtDate(ms){ if(!ms)return ''; const d=new Date(ms); if(isNaN(d)||d.getFullYear()>3000)return ''; return d.toLocaleDateString('fr-FR'); }

async function fetchAll() {
  try {
    const [l,c,t,m,r,d,ct,fo] = await Promise.all([
      grist.docApi.fetchTable('Lignes_budgetaires'),
      grist.docApi.fetchTable('Commandes'),
      grist.docApi.fetchTable('Transferts'),
      grist.docApi.fetchTable('Mouvements'),
      grist.docApi.fetchTable('Releves_PGM'),
      grist.docApi.fetchTable('Demandes_achat'),
      grist.docApi.fetchTable('Contrats'),
      grist.docApi.fetchTable('Fournisseurs'),
    ]);

    fourNoms={};
    (fo.id||[]).forEach((id,i)=>{ fourNoms[id]=(fo.Label||[])[i]||(fo.Fournisseur||[])[i]||(fo.Nom||[])[i]||('#'+id); });
    function resolFour(v){ if(v==null)return''; if(typeof v==='number')return fourNoms[v]||''; if(Array.isArray(v))return fourNoms[v[1]]||''; return String(v); }

    contratNoms={}; contratsMasques=new Set();
    (ct.id||[]).forEach((id,i)=>{
      contratNoms[id]=(ct.Nom||[])[i]||('#'+id);
      if((ct.Masquer||[])[i]){ const n=(ct.Nom||[])[i]; if(n) contratsMasques.add(String(n).trim()); }
    });
    function resolContrat(v){ if(v==null)return''; if(typeof v==='number')return contratNoms[v]||('#'+v); if(Array.isArray(v))return contratNoms[v[1]]||String(v); return String(v); }

    lignes=(l.id||[]).map((id,i)=>({
      id, label:(l.Label||[])[i]||('Ligne #'+id), contrat:resolContrat((l.Contrat||[])[i]),
      budget:(l.Budget_ajuste||[])[i]||0,
    }));

    das={};
    (d.id||[]).forEach((id,i)=>{ das[id]={
      ligne:(d.Ligne_budgetaire||[])[i], statut:(d.Statut||[])[i]||'',
      date_bc:toMs((d.Date_reception_BC||[])[i]), date_da:toMs((d.Date_DA||[])[i]), num_da:(d.Num_DA||[])[i]||'', num_bc:(d.Num_BC||[])[i]||'',
      fournisseur:resolFour((d.Fournisseur||[])[i]),
    };});

    commandes=(c.id||[]).map((id,i)=>({
      da:(c.Demande_achat||[])[i]||null,
      desig:(c.Designation2||[])[i]||'',
      type_article:(c.Type_article||[])[i]||'Produit',
      montant:(c.Montant2||[])[i]||((c.Prix_unitaire_HT||[])[i]||0)*((c.Quantite||[])[i]||1),
    }));

    transferts=(t.id||[]).map((id,i)=>({
      source:(t.Ligne_source||[])[i]||null, dest:(t.Ligne_destination||[])[i]||null,
      montant:(t.Montant||[])[i]||0, date:toMs((t.Date||[])[i]), motif:(t.Motif||[])[i]||'',
    }));

    mouvements=(m.id||[]).map((id,i)=>({
      ligne:(m.Ligne_budgetaire||[])[i]||null, type:(m.Type||[])[i]||'',
      montant:(m.Montant||[])[i]||0, date:toMs((m.Date||[])[i]), motif:(m.Motif||[])[i]||'',
      fournisseur:(m.Fournisseur||[])[i]||'',
    }));

    releves=(r.id||[]).map((id,i)=>({
      ligne:(r.Ligne_budgetaire||[])[i]||null, date:toMs((r.Date_releve||[])[i]),
      officiel:(r.Disponible_officiel||[])[i]||0,
    }));

    fillContrats();
    render();
  } catch(e) {
    document.getElementById('container').innerHTML='<div class="empty">Erreur: '+e.message+'</div>';
  }
}

function ligneIdOf(ref){ if(ref==null)return null; if(Array.isArray(ref))return ref[1]; return ref; }

function fillContrats() {
  const cs=[...new Set(lignes.map(l=>l.contrat))].filter(c=>c && !contratsMasques.has(String(c).trim())).sort((a,b)=>a.localeCompare(b,'fr'));
  const sel=document.getElementById('contrat-select');
  const cur=sel.value;
  sel.innerHTML='<option value="">— Contrat —</option>'+cs.map(c=>`<option value="${c.replace(/"/g,'&quot;')}">${c}</option>`).join('');
  if(cur) sel.value=cur;
}
function fillLignes() {
  const sel=document.getElementById('ligne-select');
  const ls=lignes.filter(l=>l.contrat===selContrat);
  sel.innerHTML='<option value="">— Ligne budgétaire —</option>'+ls.map(l=>{
    const sub=l.label.includes('|')?l.label.split('|').slice(1).join('|').trim():l.label;
    return `<option value="${l.id}">${sub.replace(/</g,'&lt;')}</option>`;
  }).join('');
}

function buildEvents(ligneId) {
  const evts=[];
  // Comandes agrupades per DA (un sol punt per DA, suma de tots els articles)
  const parDA={};
  commandes.forEach(c=>{
    if(!c.da) return;
    const da=das[c.da];
    if(!da || ligneIdOf(da.ligne)!==ligneId) return;
    if(da.statut!=='Envoyée PGM' && da.statut!=='BC reçu') return;
    // Data de l'event: recepció del BC, o data de la DA com a fallback (Envoyée PGM sense BC)
    const dEvt = da.date_bc || da.date_da;
    if(!dEvt) return;
    if(!parDA[c.da]) parDA[c.da]={ date:dEvt, num_da:da.num_da, num_bc:da.num_bc, statut:da.statut, fournisseur:da.fournisseur, sansBC:!da.date_bc, total:0, nb:0, nbProd:0, articles:[] };
    parDA[c.da].total+=c.montant;
    parDA[c.da].nb++;
    if(c.type_article!=='Service') parDA[c.da].nbProd++;
    parDA[c.da].articles.push({ desig:c.desig, montant:c.montant });
  });
  Object.values(parDA).forEach(d=>{
    const serviceOnly = d.nbProd===0;
    const lbl = d.sansBC ? (d.num_da||'Commande')+' (Envoyée PGM)' : (d.num_da||'Commande');
    evts.push({ date:d.date, type:'cmd', delta:-d.total, label:lbl, serviceOnly:serviceOnly,
                extra: serviceOnly ? (d.nb+' service'+(d.nb>1?'s':'')) : (d.nb+' article'+(d.nb>1?'s':'')),
                detail:{ kind:'cmd', num_da:d.num_da, num_bc:d.num_bc, total:d.total, articles:d.articles, statut:d.statut, fournisseur:d.fournisseur, serviceOnly:serviceOnly } });
  });
  // Mouvements
  mouvements.forEach(m=>{
    if(ligneIdOf(m.ligne)!==ligneId) return;
    const isS=m.type==='Sortie';
    evts.push({ date:m.date, type:isS?'sortie':'entree', delta:isS?-m.montant:m.montant, label:m.motif||(isS?'Sortie':'Entrée'), extra:m.type,
                detail:{ kind:'mvt', type:m.type, motif:m.motif, fournisseur:m.fournisseur, montant:m.montant } });
  });
  // Transferts
  transferts.forEach(t=>{
    if(ligneIdOf(t.dest)===ligneId) evts.push({ date:t.date, type:'transf', delta:t.montant, label:t.motif||'Transfert entrant', extra:'Entrant',
                detail:{ kind:'transf', sens:'Entrant', montant:t.montant, motif:t.motif, source:lblLigneShort(t.source), dest:lblLigneShort(t.dest) } });
    if(ligneIdOf(t.source)===ligneId) evts.push({ date:t.date, type:'transf', delta:-t.montant, label:t.motif||'Transfert sortant', extra:'Sortant',
                detail:{ kind:'transf', sens:'Sortant', montant:t.montant, motif:t.motif, source:lblLigneShort(t.source), dest:lblLigneShort(t.dest) } });
  });
  evts.sort((a,b)=>a.date-b.date);
  return evts;
}

function lblLigneShort(ref) {
  const id=ligneIdOf(ref);
  const l=lignes.find(x=>x.id===id);
  if(!l) return '—';
  return l.label.includes('|') ? l.label.split('|').slice(1).join('|').trim() : l.label;
}

function render() {
  const container=document.getElementById('container');
  if(!selLigne){ container.innerHTML='<div class="empty">Choisissez un contrat puis une ligne budgétaire.</div>'; return; }

  const ligne=lignes.find(l=>l.id===Number(selLigne));
  if(!ligne){ container.innerHTML='<div class="empty">Ligne introuvable.</div>'; return; }

  const evts=buildEvents(ligne.id);
  const rlvs=releves.filter(r=>ligneIdOf(r.ligne)===ligne.id && r.date).sort((a,b)=>a.date-b.date);

  // Punt de départ: le premier relevé PGM disponible
  if(rlvs.length===0){ container.innerHTML='<div class="empty">Aucun relevé PGM sur cette ligne. Le graphique démarre au premier relevé.</div>'; return; }

  const premierReleve=rlvs[0];
  let running=premierReleve.officiel;
  const points=[{ date:premierReleve.date, dispo:running, type:'releve', label:'Premier relevé PGM', detail:{ kind:'releve', officiel:premierReleve.officiel } }];

  // Ne considérer que les opérations postérieures au premier relevé,
  // et les relevés suivants (qui recalibrent la ligne)
  const merged=[
    ...evts.filter(e=>e.date>premierReleve.date).map(e=>({...e, kind:'evt'})),
    ...rlvs.slice(1).map(r=>({date:r.date, kind:'releve', officiel:r.officiel, type:'releve', label:'Relevé PGM'})),
  ].sort((a,b)=>a.date-b.date);

  merged.forEach(item=>{
    if(item.kind==='releve'){
      running=item.officiel;
      points.push({ date:item.date, dispo:running, type:'releve', label:'Relevé PGM', detail:{ kind:'releve', officiel:item.officiel } });
    } else {
      running+=item.delta;
      points.push({ date:item.date, dispo:running, type:item.type, delta:item.delta, label:item.label, extra:item.extra, detail:item.detail, serviceOnly:item.serviceOnly });
    }
  });

  if(points.length<=1){ container.innerHTML='<div class="empty">Aucune opération depuis le premier relevé.</div>'; return; }

  const dernierReleve = rlvs[rlvs.length-1];
  drawChart(points, ligne, dernierReleve);
}

function drawChart(points, ligne, dernierReleve) {
  const W=820, H=340, padL=64, padR=20, padT=20, padB=40;
  const iw=W-padL-padR, ih=H-padT-padB;

  // Tots els punts tenen data (el primer és el premier relevé)
  const dated=points.filter(p=>p.date);
  const minDate=dated.length?Math.min(...dated.map(p=>p.date)):Date.now();
  const maxDate=dated.length?Math.max(...dated.map(p=>p.date)):Date.now();
  const spanDate=maxDate-minDate||1;
  function xOf(p, i){
    return padL + 10 + ((p.date-minDate)/spanDate)*(iw-20);
  }

  const vals=points.map(p=>p.dispo);
  let minV=Math.min(0,...vals), maxV=Math.max(...vals);
  const range=maxV-minV||1; minV-=range*0.08; maxV+=range*0.08;
  function yOf(v){ return padT + ih - ((v-minV)/(maxV-minV))*ih; }

  const COLORS={ cmd:'#E24B4A', sortie:'#D9803F', entree:'#1D9E75', transf:'#9C6ADE', releve:'#378ADD', start:'#888' };

  // Path de la línia
  let d='';
  points.forEach((p,i)=>{ const x=xOf(p,i), y=yOf(p.dispo); d+=(i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1)+' '; });
  // Àrea
  const x0=xOf(points[0],0), xN=xOf(points[points.length-1],points.length-1);
  const area=d+`L${xN.toFixed(1)} ${yOf(minV).toFixed(1)} L${x0.toFixed(1)} ${yOf(minV).toFixed(1)} Z`;

  // Grid horitzontal (5 línies) amb etiquetes
  let grid='';
  const nGrid=5;
  for(let i=0;i<=nGrid;i++){
    const v=minV+(maxV-minV)*i/nGrid;
    const y=yOf(v);
    grid+=`<line class="grid-line" x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}"/>`;
    grid+=`<text class="axis-label" x="${padL-8}" y="${(y+3).toFixed(1)}" text-anchor="end">${Math.round(v).toLocaleString('fr-FR')}</text>`;
  }
  // Línia del zero destacada si minV<0
  let zeroLine='';
  if(minV<0 && maxV>0){ const yz=yOf(0); zeroLine=`<line class="zero-line" x1="${padL}" y1="${yz.toFixed(1)}" x2="${W-padR}" y2="${yz.toFixed(1)}"/>`; }

  // Punts
  let pts='';
  points.forEach((p,i)=>{
    if(p.type==='start') return;
    const x=xOf(p,i), y=yOf(p.dispo);
    const col=COLORS[p.type]||'#888';
    const isReleve=p.type==='releve';
    if(isReleve){
      pts+=`<rect class="pt" x="${(x-4).toFixed(1)}" y="${(y-4).toFixed(1)}" width="8" height="8" fill="${col}" data-i="${i}"/>`;
    } else if(p.serviceOnly){
      // Losange (DA composée uniquement de services)
      pts+=`<rect class="pt" x="${(x-5).toFixed(1)}" y="${(y-5).toFixed(1)}" width="10" height="10" fill="${col}" data-i="${i}" transform="rotate(45 ${x.toFixed(1)} ${y.toFixed(1)})"/>`;
    } else {
      pts+=`<circle class="pt" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5" fill="${col}" data-i="${i}"/>`;
    }
  });

  // Etiquetes de dates a l'eix X: relevés i transferts (a més del primer i últim)
  let xlabels='';
  if(dated.length){
    // Recollir les dates a etiquetar: primer punt, últim punt, relevés i transferts
    const labelPts=[];
    points.forEach((p,i)=>{
      if(p.type==='releve' || p.type==='transf') labelPts.push({date:p.date, x:xOf(p,i)});
    });
    // Afegir primer i últim
    labelPts.push({date:minDate, x:padL+10});
    labelPts.push({date:maxDate, x:padL+10+((maxDate-minDate)/spanDate)*(iw-20)});
    // Ordenar per x i evitar solapaments (mínim 55px entre etiquetes)
    labelPts.sort((a,b)=>a.x-b.x);
    let lastX=-100;
    labelPts.forEach(lp=>{
      if(lp.x-lastX<55) return;
      lastX=lp.x;
      xlabels+=`<line class="grid-line" x1="${lp.x.toFixed(1)}" y1="${padT}" x2="${lp.x.toFixed(1)}" y2="${(H-padB).toFixed(1)}" opacity="0.5"/>`;
      xlabels+=`<text class="axis-label" x="${lp.x.toFixed(1)}" y="${H-padB+22}" text-anchor="middle">${fmtDate(lp.date)}</text>`;
    });
  }

  const finalDispo=points[points.length-1].dispo;
  const svg=`
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#378ADD"/><stop offset="100%" stop-color="#378ADD" stop-opacity="0"/>
      </linearGradient></defs>
      ${grid}${zeroLine}
      <path class="dispo-area" d="${area}"/>
      <path class="dispo-line" d="${d.trim()}"/>
      ${pts}
      ${xlabels}
    </svg>`;

  const sub=ligne.label.includes('|')?ligne.label.split('|').slice(1).join('|').trim():ligne.label;
  const html=`
    <div class="legend">
      <div class="leg-item"><span class="leg-dot cmd"></span>Commande</div>
      <div class="leg-item"><span class="leg-dot sortie"></span>Sortie</div>
      <div class="leg-item"><span class="leg-dot entree"></span>Entrée</div>
      <div class="leg-item"><span class="leg-dot transf"></span>Transfert</div>
      <div class="leg-item"><span class="leg-dot releve"></span>Relevé PGM</div>
    </div>
    <div class="chart-wrap">${svg}</div>
    <div class="summary">
      <div class="sum">Dernier relevé<b>${dernierReleve ? fmtDate(dernierReleve.date) : '—'}</b></div>
      <div class="sum">Montant relevé<b>${dernierReleve ? fmt(dernierReleve.officiel) : '—'}</b></div>
      <div class="sum">Opérations<b>${points.length-1}</b></div>
      <div class="sum">Disponible actuel<b style="color:${finalDispo<0?'#E24B4A':'#1D9E75'}">${fmt(finalDispo)}</b></div>
    </div>`;
  document.getElementById('container').innerHTML=html;

  // Tooltips
  const tooltip=document.getElementById('tooltip');
  const wrap=document.querySelector('.chart-wrap');
  document.querySelectorAll('.pt').forEach(el=>{
    el.addEventListener('mouseenter',ev=>{
      const p=points[Number(el.dataset.i)];
      let html=`<b>${p.label}</b>`;
      if(p.serviceOnly) html+=` <span class="tt-svc">Service</span>`;
      if(p.extra) html+=` <span class="tt-date">(${p.extra})</span>`;
      html+=`<br><span class="tt-amount">Disponible : ${fmt(p.dispo)}</span>`;
      if(p.delta!=null) html+=`<br><span class="tt-amount" style="color:${p.delta<0?'#F09595':'#7FD9B8'}">${p.delta<0?'−':'+'} ${fmt(Math.abs(p.delta))}</span>`;
      if(p.date) html+=`<br><span class="tt-date">${fmtDate(p.date)}</span>`;
      tooltip.innerHTML=html;
      tooltip.classList.add('show');
      tooltip.style.transform='none';
      const r=el.getBoundingClientRect(), wr=wrap.getBoundingClientRect();
      const tw=tooltip.offsetWidth, th=tooltip.offsetHeight;
      const cx=r.left-wr.left+r.width/2;   // centre del punt dins el wrap
      const cyTop=r.top-wr.top;            // dalt del punt dins el wrap

      // Horitzontal: centrat, però sense sortir dels límits del wrap
      let left=cx-tw/2;
      left=Math.max(4, Math.min(left, wr.width-tw-4));
      tooltip.style.left=left+'px';

      // Vertical: per defecte a dalt; si no hi cap, a sota del punt
      let top=cyTop-th-8;
      if(top<2) top=cyTop+r.height+8;
      tooltip.style.top=top+'px';
    });
    el.addEventListener('mouseleave',()=>tooltip.classList.remove('show'));
    el.addEventListener('click',()=>{
      const p=points[Number(el.dataset.i)];
      showDetail(p);
    });
  });
}

function showDetail(p) {
  const panel=document.getElementById('detail-panel');
  if(!p || !p.detail){ panel.classList.remove('show'); return; }
  const COLORS={ cmd:'#E24B4A', sortie:'#D9803F', entree:'#1D9E75', transf:'#9C6ADE', releve:'#378ADD' };
  const col=COLORS[p.type]||'#888';
  const d=p.detail;

  let title='', body='';
  if(d.kind==='cmd'){
    title=(d.num_da||'Commande') + (d.serviceOnly ? ' <span class="dp-svc">Service</span>' : '') + (d.fournisseur ? ` <span class="dp-four">${d.fournisseur.replace(/</g,'&lt;')}</span>` : '');
    body='';
    if(d.num_bc) body+=`<div class="dp-info" style="margin-bottom:8px;"><b>BC :</b> ${String(d.num_bc).replace(/</g,'&lt;')}</div>`;
    body+=d.articles.map(a=>`<div class="dp-row"><span class="lbl">${(a.desig||'(sans nom)').replace(/</g,'&lt;')}</span><span class="val">${fmt(a.montant)}</span></div>`).join('');
    body+=`<div class="dp-total"><span>Total</span><span>${fmt(d.total)}</span></div>`;
  } else if(d.kind==='mvt'){
    title=d.type;
    body=`<div class="dp-info">`;
    if(d.motif) body+=`<b>Motif :</b> ${d.motif.replace(/</g,'&lt;')}<br>`;
    if(d.fournisseur) body+=`<b>Fournisseur :</b> ${d.fournisseur.replace(/</g,'&lt;')}<br>`;
    body+=`<b>Montant :</b> ${fmt(d.montant)}</div>`;
  } else if(d.kind==='transf'){
    title='Transfert '+d.sens.toLowerCase();
    body=`<div class="dp-info">`;
    body+=`<b>De :</b> ${d.source}<br><b>Vers :</b> ${d.dest}<br>`;
    if(d.motif) body+=`<b>Motif :</b> ${d.motif.replace(/</g,'&lt;')}<br>`;
    body+=`<b>Montant :</b> ${fmt(d.montant)}</div>`;
  } else if(d.kind==='releve'){
    title='Relevé PGM';
    body=`<div class="dp-info"><b>Disponible officiel :</b> ${fmt(d.officiel)}</div>`;
  }

  panel.innerHTML=`
    <div class="dp-head">
      <div class="dp-title"><span class="dp-badge" style="background:${col}"></span>${title}</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="dp-date">${fmtDate(p.date)}</span>
        <button class="dp-close" onclick="document.getElementById('detail-panel').classList.remove('show')">×</button>
      </div>
    </div>
    ${body}`;
  panel.classList.add('show');
}

document.getElementById('contrat-select').addEventListener('change',e=>{
  selContrat=e.target.value; selLigne=''; fillLignes();
  document.getElementById('detail-panel').classList.remove('show');
  render();
});
document.getElementById('ligne-select').addEventListener('change',e=>{
  selLigne=e.target.value;
  document.getElementById('detail-panel').classList.remove('show');
  render();
});

function loadData(){
  if(window.grist){
    grist.ready({ requiredAccess:'full' });
    fetchAll();
    grist.onRecords(()=>fetchAll());
    window.addEventListener('focus',()=>fetchAll());
  } else {
    document.getElementById('container').innerHTML='<div class="empty">Connectez à Grist.</div>';
  }
}
const s=document.createElement('script');
s.src='https://docs.getgrist.com/grist-plugin-api.js';
s.onload=loadData; s.onerror=loadData;
document.head.appendChild(s);
</script>
</body>
</html>
